<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#11151b">
<title>Fairview — Auction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --n50:   #11151b;
  --n100:  #1f252d;
  --n200:  #323943;
  --n300:  #4d5560;
  --n400:  #636c78;
  --n500:  #9ca3ac;
  --n600:  #c8cdd3;
  --n700:  #e4e7ea;
  --n800:  #f2f4f6;
  --n900:  #ffffff;
  --sell:  #f97316;
  --font:  'IBM Plex Sans', sans-serif;
  --r:     12px;
  --r-md:  22px;
  --r-pill:999px;
}

html {
  background: #11151b; /* explicit hex so safe-area colour matches before CSS vars load */
  background: var(--n50);
  overscroll-behavior: none;
}

body {
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  background: var(--n50);
  color: var(--n800);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Page ────────────────────────────────────────────────── */

.page {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: env(safe-area-inset-top, 0px);
  overflow: hidden;
  position: relative;
}

/* ── Lot heading (inside content, slides with card) ──────── */

.lot-number {
  font-size: 20px;
  font-weight: 600;
  color: var(--n800);
  letter-spacing: 0.1px;
  text-align: center;
  padding: 4px 0 2px;
}

/* ── Scroll area ─────────────────────────────────────────── */

.scroll-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  min-height: 0;
}

.content {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 4px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scrollbar-width: none;
}
.content::-webkit-scrollbar { display: none; }

/* Lot transition */
.content.out-left  { animation: outLeft  0.22s ease-in  forwards; }
.content.out-right { animation: outRight 0.22s ease-in  forwards; }
.content.in-right  { animation: inRight  0.22s ease-out; }
.content.in-left   { animation: inLeft   0.22s ease-out; }

@keyframes outLeft  { to   { transform: translateX(-30%); opacity: 0; } }
@keyframes outRight { to   { transform: translateX( 30%); opacity: 0; } }
@keyframes inRight  { from { transform: translateX( 30%); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes inLeft   { from { transform: translateX(-30%); opacity: 0; } to { transform: none; opacity: 1; } }

/* ── Lot card ────────────────────────────────────────────── */

.lot-card {
  background: linear-gradient(to bottom, var(--n100), var(--n50));
  border-radius: var(--r-md);
  border-top: 1px solid var(--n300);
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Card header (lot number + edit) ─────────────────────── */

.card-header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 8px 0;
  position: relative;
}
.lot-number { font-size: 20px; font-weight: 600; color: var(--n800); letter-spacing: 0.1px; }
.edit-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--n500);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.lot-info { padding: 4px 8px; }
.lot-vendor { font-size: 20px; font-weight: 600; color: var(--n800); letter-spacing: 0.1px; margin-bottom: 4px; }
.lot-meta   { font-size: 16px; font-weight: 500; color: var(--n700); letter-spacing: 0.1px; }

/* ── Action row (prev + next, in content flow) ───────────── */

.action-row {
  display: flex;
  gap: 8px;
  margin: 0 4px; /* visual inset to align with card's rounded corners */
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 88px); /* clears browser chrome */
}

/* ── Data cells ──────────────────────────────────────────── */

.cell-row { display: flex; gap: 12px; }

.cell {
  background: var(--n200);
  border-top: 1px solid var(--n300);
  border-radius: var(--r);
  padding: 8px 12px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.cell:active { background: #3a4250; }

.cell-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--n600);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  line-height: 1.4;
}

.cell-body {
  display: flex;
  align-items: baseline;
  gap: 3px;
  flex-wrap: nowrap;
  min-height: 28px;
}
.cell-body.right { justify-content: flex-end; }
.cell-body.is-range .cell-value { font-size: 19px; }

.cell-value     { font-size: 24px; font-weight: 500; color: var(--n800); line-height: 1; white-space: nowrap; flex-shrink: 0; }
.cell-value.dim { color: var(--n400); font-size: 20px; }
.cell-unit      { font-size: 14px; font-style: italic; color: var(--n500); font-weight: 400; white-space: nowrap; flex-shrink: 0; }
.cell-sep       { font-size: 14px; color: var(--n500); white-space: nowrap; }

/* Joined price cells */
.price-row { display: flex; }
.price-cell {
  background: var(--n200);
  border-top: 1px solid var(--n300);
  padding: 8px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
  overflow: hidden;
}
.price-cell:active { background: #3a4250; }
.price-cell:first-child { border-radius: var(--r) 0 0 var(--r); flex: 0 0 148px; }
.price-cell:last-child  { border-radius: 0 var(--r) var(--r) 0; flex: 1; margin-left: 1px; }

/* ── Price picker ────────────────────────────────────────── */

.picker-wrap {
  display: flex;
  align-items: center;
  padding: 0 4px;
}
.picker-btn {
  width: 52px;
  height: 68px;
  align-self: center;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--n500);
  font-size: 28px;
  font-weight: 300;
  font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
  border-radius: var(--r);
  transition: color 0.1s, background 0.1s;
  user-select: none;
  flex-shrink: 0;
  touch-action: manipulation;
}
.picker-btn:active { color: var(--n800); background: var(--n200); }

.picker {
  width: calc(100% - 148px); /* 74px each side for controls */
  height: 200px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  user-select: none;
  touch-action: none;
}
.picker::before, .picker::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 50px;
  pointer-events: none;
  z-index: 2;
}
.picker::before { top: 0;    background: none; }
.picker::after  { bottom: 0; background: none; }

.picker-rail {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  left: 8px; right: 8px;
  height: 42px;
  border-top:    1px solid rgba(255,255,255,0.07);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.03);
  border-radius: 4px;
  pointer-events: none;
  z-index: 1;
}
.picker-track {
  display: flex;
  flex-direction: column;
  align-items: center;
  will-change: transform;
}
.picker-item {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
  font-family: var(--font);
  width: 100%;
  overflow: hidden;
  transition: height 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              font-size 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              color 0.12s, opacity 0.12s;
}

/* ── Picker section (drum + side controls) ───────────────── */

.picker-section {
  position: relative;
  display: flex;
  justify-content: center;
}
.picker-side-left {
  position: absolute;
  left: 0;
  top: 0;          /* aligned to top of picker section */
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: flex-start;
  z-index: 2;
}
.picker-side-right {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  z-index: 2;
}
/* Side control pills */
.pc-pill {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r-pill);
  padding: 8px 12px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  border: none;
  white-space: nowrap;
  min-height: 36px;
  transition: background 0.12s, color 0.12s;
}
.pc-pill:active { opacity: 0.75; }
/* Active mode (current) */
.pc-pill.pc-mode-active { background: var(--n200); color: var(--n700); }
/* Inactive mode (other) */
.pc-pill.pc-mode-alt { background: none; border: 1px solid var(--n300); color: var(--n500); }
/* Active increment */
.pc-pill.pc-inc-active { background: var(--n500); color: var(--n50); }
/* Inactive increment */
.pc-pill.pc-inc { background: none; color: var(--n500); }

/* ── Chips ───────────────────────────────────────────────── */

/* Chip area: column stack of cells + chip rows */
.chips-row    { display: flex; flex-direction: column; gap: 12px; }
.chips-extras { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }

/* Filled buyer/underbidder cell — full width, 64px tall */
.bidder-cell {
  background: var(--n200);
  border-radius: var(--r);
  padding: 8px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-height: 64px;
  overflow: hidden;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s;
}
.bidder-cell:active         { background: #3a4250; }
.bidder-cell.buyer          { border-top: 1px solid var(--n300); }   /* neutral — confirmed sale */
.bidder-cell.underbidder    { border-top: 1px solid #44a200; }       /* buy green — bidding intent */
.bidder-names { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.bidder-cell-label  {
  font-size: 11px; font-weight: 500; color: var(--n600);
  text-transform: uppercase; letter-spacing: 0.8px; line-height: 1.4;
}
.bidder-cell-name   {
  font-size: 20px; font-weight: 500; color: var(--n800);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2;
}
.chip {
  background: var(--n200);
  border: none;
  border-top: 1px solid var(--n300);
  border-radius: var(--r-pill);
  padding: 9px 14px 9px 12px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  font-family: var(--font);
  transition: background 0.1s;
}
.chip:active { background: #3a4250; }
.chip.filled { background: var(--n300); }
.chip.buyer    { background: rgba(249,115,22,0.12); border: 1px solid rgba(249,115,22,0.3); }
.chip.buyer:active { background: rgba(249,115,22,0.22); }
.chip.not-sold { background: #be3030; border: none; border-top: 1px solid #ef4444; }
.chip.not-sold:active { background: #a82828; }
.chip.not-sold .chip-label { color: var(--n800); }
.chip-icon   { width: 14px; height: 14px; color: var(--n600); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chip-label  { font-size: 14px; font-weight: 500; color: var(--n700); line-height: 20px; white-space: nowrap; }
.chip.buyer .chip-label { color: #fb923c; }
.chip-x      { font-size: 18px; line-height: 1; color: var(--n500); margin-left: 1px; display: flex; align-items: center; }

/* (increment styles replaced by .pc-pill above) */

/* ── Narrow cell (tally) ─────────────────────────────────── */

.cell-narrow { flex: 0 0 148px !important; }

/* ── Range display: inline first, stacked as fallback ────── */

/* Inline separator word "to" */
.range-word {
  font-size: 13px;
  font-style: italic;
  color: var(--n500);
  font-weight: 400;
  white-space: nowrap;
  flex-shrink: 0;
}
/* Stacked fallback (applied when inline overflows) */
.cell-body.stacked {
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
  min-height: auto;
  flex-wrap: wrap;
}
.cell-body.right.stacked { align-items: flex-end; }
.range-primary { display: flex; align-items: baseline; gap: 3px; }
.range-secondary { display: flex; align-items: baseline; gap: 4px; margin-top: 1px; }
.range-dash   { font-size: 12px; color: var(--n400); font-weight: 400; }
.cell-value-sm { font-size: 17px; font-weight: 500; color: var(--n500); }

/* ── New client inline form ──────────────────────────────── */

.new-client-wrap { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.new-client-toggle {
  background: none;
  border: 1px dashed var(--n300);
  border-radius: var(--r);
  padding: 11px 14px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  color: var(--n500);
  cursor: pointer;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: border-color 0.1s, color 0.1s;
}
.new-client-toggle:active { color: var(--n700); border-color: var(--n500); }
.new-client-form {
  display: none;
  gap: 8px;
  flex-direction: column;
}
.new-client-form.open { display: flex; }

/* ── Notes ───────────────────────────────────────────────── */

.notes-cell {
  background: var(--n200);
  border-top: 1px solid var(--n300);
  border-radius: var(--r);
  padding: 8px 12px;
  min-height: 64px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.notes-ta {
  background: none;
  border: none;
  font-family: var(--font);
  font-size: 16px;
  color: var(--n800);
  resize: none;
  width: 100%;
  outline: none;
  caret-color: var(--sell);
  min-height: 36px;
}
.notes-ta::placeholder { color: var(--n400); font-style: italic; }

/* (nav-bar removed — buttons live in .action-row inside content) */

/* Previous button — icon only, 16px padding all sides → 57px tall */
.btn-prev {
  background: var(--n100);
  border-top: 1px solid var(--n300);
  border-left: none; border-right: none; border-bottom: none;
  border-radius: var(--r-pill);
  padding: 16px;
  font-family: var(--font);
  color: var(--n600);
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-prev:active   { background: var(--n200); }
.btn-prev:disabled { opacity: 0.3; pointer-events: none; }

/* Next button — pt:7 pb:11 px:12 → 57px tall (matches Previous) */
.btn-next {
  background: var(--n200);
  border-top: 1px solid var(--n400);
  border-left: none; border-right: none; border-bottom: none;
  border-radius: var(--r-pill);
  padding: 7px 40px 7px 12px; /* pt:7 pb:7 — desc line-height 16→20 absorbs 4px */
  font-family: var(--font);
  color: var(--n800);
  cursor: pointer;
  flex: 1;
  min-width: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s;
  display: flex;
  align-items: center;
  overflow: hidden;
  position: relative;
}
.btn-next:active   { background: #3a4250; }
.btn-next:disabled { opacity: 0.3; pointer-events: none; }

.btn-next-inner { flex: 1; display: flex; flex-direction: column; gap: 2px; align-items: center; }
.btn-next-label { font-size: 14px; font-weight: 500; color: var(--n600); letter-spacing: 0.6px; text-transform: uppercase; line-height: 20px; }
.btn-next-desc  { font-size: 16px; font-weight: 500; color: var(--n700); line-height: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.btn-next-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--n600); display: flex; align-items: center; }

/* Segmented kg/head control */
.mode-seg {
  border: 1px solid var(--n300);
  border-radius: var(--r-pill);
  display: flex;
  padding: 3px;
  gap: 2px;
  align-self: flex-start;
}
.mode-seg-opt {
  background: none;
  border: none;
  border-radius: var(--r-pill);
  padding: 5px 10px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--n700);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.12s;
  line-height: 1;
}
.mode-seg-opt.active { background: var(--n300); }

/* ── Backdrop ────────────────────────────────────────────── */

.backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  z-index: 10;
}
.backdrop.open { opacity: 1; pointer-events: all; }

/* ── Shared sheet ────────────────────────────────────────── */

.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #252c36;
  border-radius: 28px 28px 0 0;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 12px 16px;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
  z-index: 11;
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--n300);
  border-radius: 2px;
  margin: 0 auto 4px;
  flex-shrink: 0;
}
.sheet-title { font-size: 18px; font-weight: 600; color: var(--n800); flex-shrink: 0; }

/* ── Bidder sheet ────────────────────────────────────────── */

#bidderSheet { max-height: 80dvh; }

.sheet-search {
  background: var(--n200);
  border: none;
  border-radius: var(--r);
  padding: 12px 14px;
  font-family: var(--font);
  font-size: 16px;
  color: var(--n800);
  width: 100%;
  outline: none;
  caret-color: var(--sell);
  flex-shrink: 0;
}
.sheet-search::placeholder { color: var(--n500); }

.bidder-list {
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  scrollbar-width: none;
  min-height: 0;
}
.bidder-list::-webkit-scrollbar { display: none; }

.bidder-row {
  padding: 13px 12px;
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
  flex-shrink: 0;
}
.bidder-row:active { background: var(--n200); }
.bidder-row.sel    { background: rgba(249,115,22,0.07); }
.bidder-name       { font-size: 17px; font-weight: 500; color: var(--n800); }
.bidder-row.sel .bidder-name { color: #fb923c; }

/* Underbidder sheet: green accent instead of orange */
#bidderSheet.ub-mode .bidder-row.sel              { background: rgba(68,162,0,0.07); }
#bidderSheet.ub-mode .bidder-row.sel .bidder-name { color: #5ec400; }
#bidderSheet.ub-mode .bidder-row.sel .bidder-check{ background: #44a200; border-color: #44a200; }
#bidderSheet.ub-mode .sheet-search                { caret-color: #44a200; }

.bidder-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--n400);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.1s, border-color 0.1s;
}
.bidder-row.sel .bidder-check { background: var(--sell); border-color: var(--sell); }

.sheet-done {
  background: var(--n700);
  border: none;
  border-radius: var(--r-pill);
  padding: 15px;
  font-family: var(--font);
  font-size: 17px;
  font-weight: 500;
  color: var(--n50);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
  flex-shrink: 0;
}
.sheet-done:active { background: var(--n600); }

/* ── Numpad sheet ────────────────────────────────────────── */

.np-fields { display: flex; gap: 8px; }

.np-field {
  flex: 1;
  background: var(--n200);
  border-radius: var(--r);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  border: 2px solid transparent;
  transition: border-color 0.15s;
}
.np-field.active { border-color: rgba(249,115,22,0.5); }

.np-field-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--n600);
  text-transform: uppercase;
  letter-spacing: 0.7px;
}
.np-field-val {
  font-size: 28px;
  font-weight: 500;
  color: var(--n800);
  line-height: 1.1;
  display: flex;
  align-items: baseline;
  gap: 3px;
}
.np-field-val.empty { color: var(--n400); font-size: 22px; }
.np-val-unit { font-size: 14px; font-style: italic; color: var(--n500); font-weight: 400; }

.np-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.np-btn {
  background: var(--n200);
  border: none;
  border-radius: var(--r);
  height: 54px;
  font-family: var(--font);
  font-size: 22px;
  font-weight: 500;
  color: var(--n800);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.np-btn:active  { background: #3a4250; }
.np-btn.sym     { color: var(--n500); font-size: 17px; }
.np-btn.sym.off { opacity: 0.25; pointer-events: none; }
.np-btn.set {
  grid-column: 1 / -1;
  background: var(--sell);
  color: white;
  font-size: 17px;
  font-weight: 600;
}
.np-btn.set:active { background: #ea6c0e; }
</style>
</head>

      <div class="np-field-label" id="npLabelTo">To (optional)</div>
      <div class="np-field-val empty" id="npValTo">

  </div>
  <div class="np-grid">
    <button class="np-btn" onclick="npKey('7')">7</button>

    <button class="np-btn" onclick="npKey('4')">4</button>
    <button class="np-btn" onclick="npKey('5')">5</button>
    <button class="np-btn" onclick="npKey('6')">6</button>
    <button class="np-btn" onclick="npKey('1')">1</button>
    <button class="np-btn" onclick="npKey('2')">2</button>
    <button class="np-btn" onclick="npKey('3')">3</button>
    <button class="np-btn sym" id="npDel" onclick="npKey('del')"><svg width="22" height="17" viewBox="0 0 22 17" fill="none" aria-hidden="true"><path d="M8.5 1.5H20.5V15.5H8.5L1.5 8.5L8.5 1.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M13 6L18 11M18 6L13 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
    <button class="np-btn sym" id="npDot" onclick="npKey('.')">.</button>
    <button class="np-btn" onclick="npKey('0')">0</button>
    <button class="np-btn set" onclick="npSet()">Set</button>
  </div>
</div>

<script>
// ─── Lot data ─────────────────────────────────────────────────────────────────

const LOTS = [
  { num: 81, vendor: 'Jenna Keliwen Cattle', meta: '3yr · Speckle Park · Breeding Bulls',  desc: '2 × Speckle Park Bulls',
    tally: { from: 2, to: null }, weight: { from: 255, to: null }, priceIdx: 130 },
  { num: 82, vendor: 'Parata Angus',          meta: '2yr · Angus · Heifers',                desc: '8 × Angus Heifers',
    tally: { from: 8, to: null }, weight: { from: null, to: null }, priceIdx: 120 },
  { num: 83, vendor: 'McKenzie Farming Co',   meta: '4yr · Hereford · Cows & Calves',       desc: '3 × Hereford Cows & Calves',
    tally: { from: 3, to: null }, weight: { from: null, to: null }, priceIdx: 150 },
];

const states = LOTS.map(lot => ({
  tally:       { from: lot.tally.from,  to: lot.tally.to  },
  weight:      { from: lot.weight.from, to: lot.weight.to },
  priceIdx:    lot.priceIdx,
  priceLowIdx: null,
  headManual:  { from: null, to: null },
  buyer:       null,
  underbidders:[],
  notSold:     false,
  notes:       '',
}));

let lotIdx = 0;
const S = () => states[lotIdx];

// ─── Picker ───────────────────────────────────────────────────────────────────

const STEP = 0.02, START = 0.50, TOTAL = 350, PCTR = 100;

// Variable item heights by distance from centre — reduces gap between outliers
// without changing the feel of centre ↔ ±1
const ITEM_HEIGHTS = [42, 34, 22, 16, 12];
function getItemH(d) { return d < ITEM_HEIGHTS.length ? ITEM_HEIGHTS[d] : 0; }

// Precomputed track offsets: offset[idx] = translateY that centres item idx
const pickerOffsets = new Float32Array(TOTAL);
function precomputeOffsets() {
  // Array is built in reverse (high prices at top), so DOM position of priceIdx = TOTAL-1-idx
  for (let idx = 0; idx < TOTAL; idx++) {
    const pos = TOTAL - 1 - idx;
    let sum = 0;
    for (let i = 0; i < pos; i++) sum += getItemH(Math.abs(i - pos));
    pickerOffsets[idx] = PCTR - ITEM_HEIGHTS[0] / 2 - sum;
  }
}

const DRAG_SENS = 34; // pixels per index step during drag

function getPrice(i) { return START + i * STEP; }
function fmtP(n)     { return n.toFixed(2); }

let pickerMode = 'kg'; // 'kg' | 'head'

// Increment options
const KG_OPTS   = [{label:'2¢', val:0.02}, {label:'10¢', val:0.10}];
const HEAD_OPTS = [{label:'$10', val:10}, {label:'$100', val:100},
                   {label:'$500', val:500}, {label:'$1k', val:1000}];
let kgInc   = 0.02;  // $/kg
let headInc = 100;   // $/head

function currentSteps() {
  if (pickerMode === 'head') {
    const w = S().weight.from || 300;
    return Math.max(1, Math.round(headInc / (w * STEP)));
  }
  return Math.max(1, Math.round(kgInc / STEP));
}

function setKgInc(val)   { kgInc   = val; renderPickerControls(); }
function setHeadInc(val) { headInc = val; renderPickerControls(); }

function renderPickerControls() {
  const isHead = pickerMode === 'head';
  const opts   = isHead ? HEAD_OPTS : KG_OPTS;
  const curVal = isHead ? headInc : kgInc;
  const setFn  = isHead ? 'setHeadInc' : 'setKgInc';

  // Left: segmented kg/head pill + increments below
  document.getElementById('pickerSideLeft').innerHTML =
    `<div class="mode-seg">
       <button class="mode-seg-opt${!isHead ? ' active' : ''}" onclick="togglePickerMode()">kg</button>
       <button class="mode-seg-opt${isHead  ? ' active' : ''}" onclick="togglePickerMode()">head</button>
     </div>` +
    opts.map(o =>
      `<button class="pc-pill ${o.val === curVal ? 'pc-inc-active' : 'pc-inc'}"
               onclick="${setFn}(${o.val})">${o.label}</button>`
    ).join('');

  // Right: nothing (mode control is now on left as segmented)
  document.getElementById('pickerSideRight').innerHTML = '';
}

function getPickerLabel(i) {
  if (pickerMode === 'head') {
    const w = S().weight.from;
    if (w) return '$' + Math.round(getPrice(i) * w);
  }
  return fmtP(getPrice(i));
}

function refreshPickerLabels() {
  const items = document.getElementById('pickerTrack').children;
  for (let i = 0; i < items.length; i++) items[i].textContent = getPickerLabel(TOTAL - 1 - i);
}

function togglePickerMode() {
  pickerMode = pickerMode === 'kg' ? 'head' : 'kg';
  refreshPickerLabels();
  renderPickerControls();
}

function buildPicker() {
  const track = document.getElementById('pickerTrack');
  for (let i = 0; i < TOTAL; i++) {
    const el = document.createElement('div');
    el.className = 'picker-item';
    el.textContent = getPickerLabel(TOTAL - 1 - i); // reversed: high prices at top
    track.appendChild(el);
  }
  precomputeOffsets();
}

function applyPickerPos(animate, easing, dur) {
  const track = document.getElementById('pickerTrack');
  track.style.transition = animate
    ? `transform ${dur || 120}ms ${easing || 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'}`
    : 'none';
  track.style.transform = `translateY(${pickerOffsets[S().priceIdx]}px)`;
}

function styleItems() {
  const items = document.getElementById('pickerTrack').children;
  const centerPos = TOTAL - 1 - S().priceIdx; // DOM position in reversed array
  for (let i = 0; i < items.length; i++) {
    const d = Math.abs(i - centerPos);
    let h, fs, col, op;
    switch (d) {
      case 0: h=42; fs='34px'; col='#f2f4f6'; op=1;    break;
      case 1: h=34; fs='20px'; col='#c8cdd3'; op=1;    break;
      case 2: h=22; fs='14px'; col='#c8cdd3'; op=0.65; break;
      case 3: h=16; fs='11px'; col='#9ca3ac'; op=0.4;  break;
      case 4: h=12; fs='9px';  col='#9ca3ac'; op=0.2;  break;
      default:h=0;  fs='0px';  col='#9ca3ac'; op=0;    break;
    }
    items[i].style.height   = h + 'px';
    items[i].style.fontSize = fs;
    items[i].style.color    = col;
    items[i].style.opacity  = op;
  }
}

function movePicker(delta) {
  S().priceIdx = Math.max(0, Math.min(TOTAL - 1, S().priceIdx + delta * currentSteps()));
  applyPickerPos(true);
  styleItems();
  updateCells();
}

// Drag + tap-to-step (tap above centre = −, below = +)
let dragging = false, dragMoved = false, dragY0 = 0, dragIdx0 = 0;
let velY = 0, prevY = 0, prevT = 0, rafId = null;
const pickerEl = document.getElementById('picker');

pickerEl.addEventListener('pointerdown', e => {
  if (rafId) cancelAnimationFrame(rafId);
  dragging  = true;
  dragMoved = false;
  dragY0 = e.clientY; dragIdx0 = S().priceIdx;
  velY = 0; prevY = e.clientY; prevT = performance.now();
  pickerEl.setPointerCapture(e.pointerId);
  document.getElementById('pickerTrack').style.transition = 'none';
});

pickerEl.addEventListener('pointermove', e => {
  if (!dragging) return;
  if (Math.abs(e.clientY - dragY0) > 6) dragMoved = true;
  const now = performance.now(), dt = now - prevT;
  if (dt > 0) velY = (prevY - e.clientY) / dt;
  prevY = e.clientY; prevT = now;
  if (dragMoved) {
    const dy = dragY0 - e.clientY;
    S().priceIdx = Math.max(0, Math.min(TOTAL - 1, Math.round(dragIdx0 - dy / DRAG_SENS)));
    applyPickerPos(false);
    styleItems();
    updateCells();
  }
});

pickerEl.addEventListener('pointerup', e => {
  dragging = false;
  if (!dragMoved) {
    // Tap: above centre = step down, below centre = step up
    const rect = pickerEl.getBoundingClientRect();
    const y = e.clientY - rect.top;
    movePicker(y < PCTR ? 1 : -1); // above = higher number = increase
    return;
  }
  let v = velY;
  function coast() {
    v *= 0.82;
    if (Math.abs(v) < 0.03) {
      applyPickerPos(true, 'cubic-bezier(0.22, 1, 0.36, 1)', 160);
      return;
    }
    S().priceIdx = Math.max(0, Math.min(TOTAL - 1, Math.round(S().priceIdx - v * 1.4)));
    applyPickerPos(false);
    styleItems();
    updateCells();
    rafId = requestAnimationFrame(coast);
  }
  rafId = requestAnimationFrame(coast);
});

// ─── Cell rendering ───────────────────────────────────────────────────────────

// Font-load guard: measurement is only accurate once the real font is in use
let fontsReady = false;
document.fonts.ready.then(() => { fontsReady = true; updateCells(); });

// Off-screen element for reliable text-width measurement
// (getBoundingClientRect fails inside overflow:hidden containers)
let _ruler = null;
function rulerWidth(from, to, unit) {
  if (!_ruler) {
    _ruler = document.createElement('div');
    _ruler.style.cssText = 'position:absolute;top:-9999px;left:-9999px;visibility:hidden;white-space:nowrap;display:flex;align-items:baseline;gap:3px;';
    document.body.appendChild(_ruler);
  }
  const u = unit ? `<span style="font-size:14px;font-style:italic;font-family:inherit;font-weight:400">${unit}</span>` : '';
  _ruler.style.fontFamily = "'IBM Plex Sans', sans-serif";
  _ruler.innerHTML = `<span style="font-size:24px;font-weight:500">${from}</span><span style="font-size:13px;font-style:italic;font-weight:400">to</span><span style="font-size:24px;font-weight:500">${to}</span>${u}`;
  return _ruler.offsetWidth;
}

function renderCell(id, from, to, unit, rightAlign) {
  const el = document.getElementById(id);
  el.classList.toggle('right', !!rightAlign);
  el.classList.remove('stacked');
  const u = unit ? `<span class="cell-unit">${unit}</span>` : '';

  if (from === null || from === undefined) {
    el.innerHTML = `<span class="cell-value dim">—</span>${u}`;
    return;
  }

  const hasRange = to !== null && to !== undefined;

  if (!hasRange) {
    el.innerHTML = `<span class="cell-value">${from}</span>${u}`;
    return;
  }

  const stackedHTML = `
    <div class="range-primary"><span class="cell-value">${from}</span>${u}</div>
    <div class="range-secondary"><span class="range-dash">–</span><span class="cell-value-sm">${to}</span></div>`;

  if (!fontsReady) {
    el.classList.add('stacked');
    el.innerHTML = stackedHTML;
    return;
  }

  // Measure inline width off-screen (avoids overflow:hidden container clipping)
  const needed = rulerWidth(from, to, unit);
  const available = el.offsetWidth;

  if (needed > available) {
    el.classList.add('stacked');
    el.innerHTML = stackedHTML;
  } else {
    el.innerHTML = `<span class="cell-value">${from}</span><span class="range-word">to</span><span class="cell-value">${to}</span>${u}`;
  }
}

function computeHead() {
  const s = S();
  if (!s.weight.from) return { from: null, to: null };
  const pHi = getPrice(s.priceIdx);
  const pLo = s.priceLowIdx !== null ? getPrice(s.priceLowIdx) : pHi;
  const low  = Math.min(pLo, pHi) * s.weight.from;
  const high = Math.max(pLo, pHi) * (s.weight.to || s.weight.from);
  if (Math.abs(low - high) < 0.005) return { from: low.toFixed(2), to: null };
  return { from: low.toFixed(2), to: high.toFixed(2) };
}

function updateCells() {
  const s = S();
  renderCell('tallyBody',    s.tally.from,  s.tally.to,  '');
  renderCell('weightBody',   s.weight.from, s.weight.to, 'kg', true);

  const pHiStr = fmtP(getPrice(s.priceIdx));
  const pLoStr = s.priceLowIdx !== null ? fmtP(getPrice(s.priceLowIdx)) : null;
  renderCell('priceKgBody', pLoStr || pHiStr, pLoStr ? pHiStr : null, '/kg', true);

  if (s.headManual.from !== null) {
    renderCell('priceHeadBody', s.headManual.from, s.headManual.to, '/head', true);
  } else {
    const h = computeHead();
    renderCell('priceHeadBody', h.from, h.to, '/head', true);
  }
}

// ─── Numpad ───────────────────────────────────────────────────────────────────

let npMode = null, npActive = 'from', npFrom = '', npTo = '';

const NP_CFG = {
  tally:     { title: 'Enter tally',     unit: '',      maxLen: 4, decimal: false,
               labelFrom: 'From', labelTo: 'To (optional)' },
  weight:    { title: 'Enter weight',    unit: 'kg',    maxLen: 6, decimal: true,
               labelFrom: 'From', labelTo: 'To (optional)' },
  pricekg:   { title: 'Set price /kg',   unit: '/kg',   maxLen: 5, decimal: true,
               labelFrom: 'Low (optional)', labelTo: 'Main' },
  pricehead: { title: 'Set price /head', unit: '/head', maxLen: 7, decimal: true,
               labelFrom: 'From', labelTo: 'To (optional)' },
};

function openNumpad(mode) {
  npMode = mode;
  const s = S(), cfg = NP_CFG[mode];

  if (mode === 'tally') {
    npFrom = s.tally.from !== null ? String(s.tally.from) : '';
    npTo   = s.tally.to   !== null ? String(s.tally.to)   : '';
    npActive = 'from';
  } else if (mode === 'weight') {
    npFrom = s.weight.from !== null ? String(s.weight.from) : '';
    npTo   = s.weight.to   !== null ? String(s.weight.to)   : '';
    npActive = 'from';
  } else if (mode === 'pricekg') {
    npFrom = s.priceLowIdx !== null ? fmtP(getPrice(s.priceLowIdx)) : '';
    npTo   = fmtP(getPrice(s.priceIdx));
    npActive = 'to';
  } else if (mode === 'pricehead') {
    npFrom = s.headManual.from !== null ? String(s.headManual.from) : '';
    npTo   = s.headManual.to   !== null ? String(s.headManual.to)   : '';
    npActive = 'from';
  }

  document.getElementById('npTitle').textContent     = cfg.title;
  document.getElementById('npLabelFrom').textContent = cfg.labelFrom;
  document.getElementById('npLabelTo').textContent   = cfg.labelTo;
  document.getElementById('npUnitFrom').textContent  = cfg.unit;
  document.getElementById('npUnitTo').textContent    = cfg.unit;
  document.getElementById('npDot').classList.toggle('off', !cfg.decimal);

  renderNpFields();
  openSheet('numpad');
}

function setNpActive(which) { npActive = which; renderNpFields(); }

function renderNpFields() {
  const set = (fieldId, valId, numId, str, isActive) => {
    document.getElementById(fieldId).classList.toggle('active', isActive);
    const valEl = document.getElementById(valId);
    valEl.classList.toggle('empty', !str);
    document.getElementById(numId).textContent = str || '—';
  };
  set('npFieldFrom', 'npValFrom', 'npNumFrom', npFrom, npActive === 'from');
  set('npFieldTo',   'npValTo',   'npNumTo',   npTo,   npActive === 'to');
}

function npKey(key) {
  const cfg = NP_CFG[npMode];
  let cur = npActive === 'from' ? npFrom : npTo;

  if (key === 'del') {
    cur = cur.slice(0, -1);
  } else if (key === '.') {
    if (cfg.decimal && !cur.includes('.') && cur.length > 0) cur += '.';
  } else {
    const dot = cur.indexOf('.');
    const tooManyDp = dot >= 0 && (cur.length - dot) > 2;
    if (!tooManyDp && cur.length < cfg.maxLen) cur += key;
  }

  if (npActive === 'from') npFrom = cur; else npTo = cur;
  renderNpFields();
}

function priceStrToIdx(str) {
  const n = parseFloat(str);
  return isNaN(n) ? null : Math.max(0, Math.min(TOTAL - 1, Math.round((n - START) / STEP)));
}

function npSet() {
  const s = S();
  const pF = str => { const n = parseFloat(str); return isNaN(n) ? null : n; };

  if (npMode === 'tally') {
    s.tally.from = pF(npFrom); s.tally.to = pF(npTo);

  } else if (npMode === 'weight') {
    s.weight.from = pF(npFrom); s.weight.to = pF(npTo);
    s.headManual = { from: null, to: null };
    refreshPickerLabels();
    renderPickerControls();

  } else if (npMode === 'pricekg') {
    const hi = priceStrToIdx(npTo), lo = priceStrToIdx(npFrom);
    if (hi !== null) { s.priceIdx = hi; applyPickerPos(true, 'cubic-bezier(0.22,1,0.36,1)', 300); }
    s.priceLowIdx = lo;
    s.headManual = { from: null, to: null };

  } else if (npMode === 'pricehead') {
    s.headManual.from = pF(npFrom); s.headManual.to = pF(npTo);
  }

  closeSheet('numpad');
  styleItems();
  updateCells();
}

// ─── Bidder sheet ─────────────────────────────────────────────────────────────

  'Aaron Fitzgerald','Abigail Turner','Ben Mackay','Blake Morrison',
  'Brad Sutherland','Callum McKenzie','Cameron Taufa','Christine Dawson',
  'Craig Nelson','David Forsyth','Dean Parata','Deborah Halliday',
  'Dylan Walsh','Emma Whitfield','Ethan Hemi','Fiona Campbell',
  'Gareth Owen','Grant Stirling','Hannah Beattie','Hunter Collins',
  'Jade Rawiri',"James O'Brien",'Jason Ngata','Jessica Lambert',
  'Jonathan Cairns','Josh Tane','Karen Blackwell','Katrina Holland',
  'Kyle Robertson','Laura Sinclair','Liam Brunton','Lisa Hendricks',
  'Mark Currie','Matt Tūhoe','Melissa Grant','Michael Ahern',
  'Mike Fraser','Nathan Reid','Nicole Perkins','Olivia Stewart',
  'Paul Whaanga','Peter Donaldson','Rachel Bennett','Rebecca Ellis',
  'Ross Mackay','Ryan Coster','Sam Henare','Sarah Thompson',
  'Scott Buchanan','Shannon Kerr','Shaun Matenga','Simon Lockwood',
  'Stephanie Hayes','Steve Patterson','Stuart Piper','Tania Ngāpō',
  'Tim Ashby','Todd Galloway','Tony Parata','Tracy Williams','Warren Hunter',
];

let bidderMode = null, tempUBs = [];

function openBidderSheet(mode) {
  bidderMode = mode;
  tempUBs = [...S().underbidders];
  document.getElementById('bidderSheet').classList.toggle('ub-mode', mode === 'underbidder');
  const isUB = mode === 'underbidder';
  document.getElementById('bidderTitle').textContent  = isUB ? 'Select underbidders' : 'Select buyer';
  document.getElementById('bidderDone').style.display = isUB ? 'block' : 'none';
  document.getElementById('bidderSearch').value = '';
  document.getElementById('newClientName').value = '';
  document.getElementById('newClientForm').classList.remove('open');
  document.getElementById('newClientToggle').style.display = 'block';
  filterBidders();
  openSheet('bidder');
  setTimeout(() => document.getElementById('bidderSearch').focus(), 320);
}

function closeBidderSheet() {
  if (bidderMode === 'underbidder') S().underbidders = [...tempUBs];
  closeSheet('bidder');
  renderChips();
}

function filterBidders() {
  const q = document.getElementById('bidderSearch').value.toLowerCase().trim();
  const hits = q ? BIDDERS.filter(b => b.toLowerCase().includes(q)) : BIDDERS;
  document.getElementById('bidderList').innerHTML = hits.map(name => {
    const sel  = bidderMode === 'buyer' ? S().buyer === name : tempUBs.includes(name);
    const safe = name.replace(/'/g, "\\'");
    return `<div class="bidder-row${sel?' sel':''}" onclick="selectBidder('${safe}')">
      <span class="bidder-name">${name}</span>
      <div class="bidder-check">${sel?chkSvg():''}</div>
    </div>`;
  }).join('');
}

function selectBidder(name) {
  if (bidderMode === 'buyer') {
    // Toggle: tap current buyer to deselect, tap another to select
    S().buyer = S().buyer === name ? null : name;
    closeBidderSheet();
  }
  else {
    const i = tempUBs.indexOf(name);
    i >= 0 ? tempUBs.splice(i,1) : tempUBs.push(name);
    filterBidders();
  }
}

// ─── Chips ────────────────────────────────────────────────────────────────────

function plusSvg() {
  return `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><line x1="6.5" y1="1" x2="6.5" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="6.5" x2="12" y2="6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
}
function noSvg() {
  return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><line x1="2.5" y1="2.5" x2="11.5" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}
function chkSvg() {
  return `<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function renderChips() {
  const s = S();
  const buyerSet = !!s.buyer;
  const ubSet    = s.underbidders.length > 0;
  const ns       = s.notSold;
  let html       = '';

  if (ns) {
    // NOT SOLD active — buyer/underbidder UI hidden
    html = `<div class="chips-extras">
      <button class="chip not-sold" onclick="clearNotSold()">
        <span class="chip-icon">${noSvg()}</span>
        <span class="chip-label">Not sold</span>
      </button>
    </div>`;

  } else {
    // --- Buyer cell ---
    html += buyerSet
      ? `<div class="bidder-cell buyer" onclick="openBidderSheet('buyer')">
           <div class="bidder-cell-label">Buyer</div>
           <div class="bidder-cell-name">${s.buyer}</div>
         </div>`
      : '';

    // --- Underbidders: single cell, each name on its own line ---
    if (ubSet) {
      const ubLabel = s.underbidders.length > 1 ? `Underbidders · ${s.underbidders.length}` : 'Underbidder';
      const nameRows = s.underbidders.map(n => `<div class="bidder-cell-name">${n}</div>`).join('');
      html += `<div class="bidder-cell underbidder" onclick="openBidderSheet('underbidder')">
        <div class="bidder-cell-label">${ubLabel}</div>
        <div class="bidder-names">${nameRows}</div>
      </div>`;
    }

    // --- Action chips row ---
    // Always show + Buyer (if no buyer) and + Underbidder
    // Not sold only visible if no buyer is set
    const buyerChip = !buyerSet
      ? `<button class="chip" onclick="openBidderSheet('buyer')">
           <span class="chip-icon">${plusSvg()}</span>
           <span class="chip-label">Buyer</span>
         </button>` : '';
    const nsChip = !buyerSet
      ? `<button class="chip" onclick="setNotSold()">
           <span class="chip-icon">${plusSvg()}</span>
           <span class="chip-label">Not sold</span>
         </button>` : '';

    html += `<div class="chips-extras">
      ${buyerChip}
      <button class="chip" onclick="openBidderSheet('underbidder')">
        <span class="chip-icon">${plusSvg()}</span>
        <span class="chip-label">Underbidder</span>
      </button>
      ${nsChip}
    </div>`;
  }

  document.getElementById('chipsRow').innerHTML = html;
}

function setNotSold()  { S().notSold = true;  S().buyer = null; S().underbidders = []; renderChips(); }
function clearNotSold(){ S().notSold = false; renderChips(); }
function removeUB(name){ S().underbidders = S().underbidders.filter(n=>n!==name); renderChips(); }

// ─── Sheets ───────────────────────────────────────────────────────────────────

function openSheet(which) {
  document.getElementById('backdrop').classList.add('open');
  document.getElementById(which==='bidder'?'bidderSheet':'numpadSheet').classList.add('open');
  document.getElementById('backdrop').onclick = () =>
    which==='bidder' ? closeBidderSheet() : closeSheet('numpad');
}
function closeSheet(which) {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById(which==='bidder'?'bidderSheet':'numpadSheet').classList.remove('open');
}

// ─── Navigation ──────────────────────────────────────────────────────────────

function saveCurrent() { S().notes = document.getElementById('notesField').value; }

function loadLot() {
  const lot = LOTS[lotIdx], s = S();
  document.getElementById('lotNumber').textContent = `Lot ${lot.num}`;
  document.getElementById('lotVendor').textContent = lot.vendor;
  document.getElementById('lotMeta').textContent   = lot.meta;
  document.getElementById('notesField').value      = s.notes;
  document.getElementById('btnPrev').disabled = lotIdx === 0;
  document.getElementById('btnNext').disabled = lotIdx === LOTS.length - 1;
  applyPickerPos(false);
  styleItems();
  refreshPickerLabels();
  renderPickerControls();
  updateCells();
  renderChips();
  const prev = lotIdx > 0 ? LOTS[lotIdx - 1] : null;
  const next = lotIdx < LOTS.length - 1 ? LOTS[lotIdx + 1] : null;
  document.getElementById('btnNextLabel').textContent = next ? `Next Lot ${next.num}` : 'Last lot';
  document.getElementById('btnNextSub').textContent   = next ? next.desc : '';
  document.getElementById('btnPrevSub').textContent   = prev ? `Lot ${prev.num}` : '';
}

function navigate(dir) {
  saveCurrent();
  const c = document.getElementById('content');
  const outCls = dir > 0 ? 'out-left' : 'out-right';
  const inCls  = dir > 0 ? 'in-right' : 'in-left';
  c.classList.add(outCls);
  c.addEventListener('animationend', () => {
    c.classList.remove(outCls);
    lotIdx += dir;
    loadLot();
    c.classList.add(inCls);
    c.addEventListener('animationend', () => c.classList.remove(inCls), { once: true });
  }, { once: true });
}

// ─── New client ───────────────────────────────────────────────────────────────

function toggleNewClient() {
  const form   = document.getElementById('newClientForm');
  const toggle = document.getElementById('newClientToggle');
  const open   = form.classList.toggle('open');
  toggle.style.display = open ? 'none' : 'block';
  if (open) setTimeout(() => document.getElementById('newClientName').focus(), 80);
}

function addNewClient() {
  const input = document.getElementById('newClientName');
  const name  = input.value.trim();
  if (!name) return;
  if (!BIDDERS.includes(name)) { BIDDERS.push(name); BIDDERS.sort(); }
  input.value = '';
  // Reset form
  document.getElementById('newClientForm').classList.remove('open');
  document.getElementById('newClientToggle').style.display = 'block';
  selectBidder(name);
}

buildPicker();
loadLot();
