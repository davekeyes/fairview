<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fairview — Auction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --n50:   #11151b;
  --n100:  #1f252d;
  --n200:  #323943;
  --n300:  #4d5560;
  --n400:  #636c78;
  --n500:  #9ca3ac;
  --n600:  #c8cdd3;
  --n700:  #e4e7ea;
  --n800:  #f2f4f6;
  --n900:  #ffffff;
  --sell:  #f97316;
  --font:  'IBM Plex Sans', sans-serif;
  --r-sm:  8px;
  --r-md:  16px;
  --r-pill: 999px;
}

html, body {
  height: 100%;
  background: #0d0f12;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}

/* ── Phone shell ─────────────────────────────────────────── */

.phone {
  width: 393px;
  height: 852px;
  background: var(--n50);
  border-radius: 50px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7);
}

/* ── Status bar ──────────────────────────────────────────── */

.status-bar {
  height: 59px;
  background: var(--n50);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  flex-shrink: 0;
}
.status-time {
  font-size: 15px;
  font-weight: 600;
  color: var(--n900);
  letter-spacing: 0.1px;
}
.status-icons {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--n900);
}

/* ── Scrollable content ──────────────────────────────────── */

.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scrollbar-width: none;
}
.content::-webkit-scrollbar { display: none; }

/* ── Lot heading ─────────────────────────────────────────── */

.lot-heading {
  font-size: 20px;
  font-weight: 600;
  color: var(--n800);
  letter-spacing: 0.1px;
  text-align: center;
  padding: 8px 0;
  flex-shrink: 0;
}

/* ── Lot card ────────────────────────────────────────────── */

.lot-card {
  background: var(--n100);
  border-radius: var(--r-md);
  border-top: 2px solid var(--sell);
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.lot-info { padding: 8px; }
.lot-vendor {
  font-size: 20px;
  font-weight: 600;
  color: var(--n800);
  letter-spacing: 0.1px;
  margin-bottom: 4px;
}
.lot-meta {
  font-size: 16px;
  font-weight: 500;
  color: var(--n700);
  letter-spacing: 0.1px;
  display: flex;
  flex-wrap: wrap;
  gap: 0 4px;
}

/* ── Data cells ──────────────────────────────────────────── */

.cell-row { display: flex; gap: 12px; }

.cell {
  background: var(--n200);
  border-radius: var(--r-sm);
  padding: 8px 12px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.cell:active { background: #3a4250; }
.cell.no-tap { cursor: default; }
.cell.no-tap:active { background: var(--n200); }

.cell-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--n700);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  line-height: 1.2;
}
.cell-value {
  font-size: 24px;
  font-weight: 500;
  color: var(--n800);
  display: flex;
  align-items: baseline;
  gap: 3px;
  line-height: 1;
  margin-top: 2px;
}
.cell-value.right { justify-content: flex-end; }
.cell-unit {
  font-size: 14px;
  font-style: italic;
  color: var(--n500);
  font-weight: 400;
}

/* price row: joined cells */
.price-row { display: flex; }
.price-cell {
  background: var(--n200);
  padding: 8px 12px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.price-cell:first-child {
  border-radius: var(--r-sm) 0 0 var(--r-sm);
  flex: 0 0 149px;
}
.price-cell:last-child {
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  margin-left: 1px;
}
.price-label-hidden { opacity: 0; }

/* ── Price picker ────────────────────────────────────────── */

.picker-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  position: relative;
  padding: 0 4px;
}

.picker-side-btn {
  width: 52px;
  height: 160px;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--n500);
  font-size: 30px;
  font-weight: 300;
  font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
  border-radius: var(--r-sm);
  transition: color 0.1s, background 0.1s;
  user-select: none;
  flex-shrink: 0;
}
.picker-side-btn:active {
  color: var(--n800);
  background: var(--n200);
}

.picker {
  height: 160px;
  overflow: hidden;
  flex: 1;
  position: relative;
  cursor: ns-resize;
  user-select: none;
  touch-action: none;
}

/* Fade gradients top & bottom */
.picker::before,
.picker::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 50px;
  z-index: 1;
  pointer-events: none;
}
.picker::before {
  top: 0;
  background: linear-gradient(to bottom, var(--n100), transparent);
}
.picker::after {
  bottom: 0;
  background: linear-gradient(to top, var(--n100), transparent);
}

.picker-track {
  display: flex;
  flex-direction: column;
  align-items: center;
  will-change: transform;
}

.picker-item {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
  font-family: var(--font);
  height: 40px;
  width: 100%;
  transition: font-size 0.12s, color 0.12s, opacity 0.12s;
}

/* ── Action chips ────────────────────────────────────────── */

.chips-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.chip {
  background: var(--n200);
  border: none;
  border-radius: var(--r-pill);
  padding: 8px 14px 8px 12px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
  font-family: var(--font);
}
.chip:active { background: #3a4250; }
.chip.has-value { background: var(--n300); }
.chip.buyer-chip { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.35); }
.chip.buyer-chip:active { background: rgba(249,115,22,0.25); }

.chip-icon {
  width: 16px;
  height: 16px;
  color: var(--n600);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.chip-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--n700);
  letter-spacing: 0.1px;
  line-height: 20px;
  white-space: nowrap;
}
.chip.buyer-chip .chip-label { color: #fb923c; }
.chip-remove {
  font-size: 18px;
  line-height: 1;
  color: var(--n500);
  margin-left: 2px;
  display: flex;
  align-items: center;
}

/* ── Notes ───────────────────────────────────────────────── */

.notes-cell {
  background: var(--n200);
  border-radius: var(--r-sm);
  padding: 8px 12px;
  min-height: 64px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.notes-textarea {
  background: none;
  border: none;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 400;
  color: var(--n800);
  resize: none;
  width: 100%;
  outline: none;
  caret-color: var(--sell);
  min-height: 36px;
}
.notes-textarea::placeholder {
  color: var(--n400);
  font-style: italic;
}

/* ── Nav buttons ─────────────────────────────────────────── */

.nav-row {
  display: flex;
  gap: 16px;
  flex-shrink: 0;
}
.btn-prev {
  background: var(--n100);
  border: 1px solid var(--n200);
  border-radius: var(--r-pill);
  padding: 16px 20px;
  font-family: var(--font);
  font-size: 18px;
  font-weight: 500;
  color: var(--n800);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
  white-space: nowrap;
  letter-spacing: 0.1px;
}
.btn-prev:active { background: var(--n200); }
.btn-next {
  background: var(--n700);
  border: 1px solid var(--n900);
  border-radius: var(--r-pill);
  padding: 16px 12px;
  font-family: var(--font);
  font-size: 18px;
  font-weight: 500;
  color: var(--n50);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  flex: 1;
  transition: background 0.1s;
  letter-spacing: 0.1px;
}
.btn-next:active { background: var(--n600); }

/* ── Bottom sheet shared ─────────────────────────────────── */

.backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
  z-index: 10;
}
.backdrop.open { opacity: 1; pointer-events: all; }

.sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #252c36;
  border-radius: 20px 20px 0 0;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 11;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 12px 16px 40px;
  max-height: 78%;
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px;
  height: 4px;
  background: var(--n300);
  border-radius: 2px;
  margin: 0 auto 4px;
  flex-shrink: 0;
}
.sheet-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--n800);
  letter-spacing: 0.1px;
  flex-shrink: 0;
}

/* ── Bidder sheet ────────────────────────────────────────── */

.sheet-search {
  background: var(--n200);
  border: none;
  border-radius: var(--r-sm);
  padding: 12px 14px;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 400;
  color: var(--n800);
  width: 100%;
  outline: none;
  caret-color: var(--sell);
  flex-shrink: 0;
}
.sheet-search::placeholder { color: var(--n500); }

.bidder-list {
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  scrollbar-width: none;
}
.bidder-list::-webkit-scrollbar { display: none; }

.bidder-item {
  padding: 14px 12px;
  border-radius: var(--r-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
  flex-shrink: 0;
}
.bidder-item:active { background: var(--n200); }
.bidder-item.selected { background: rgba(249,115,22,0.08); }

.bidder-name {
  font-size: 17px;
  font-weight: 500;
  color: var(--n800);
}
.bidder-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--n400);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.1s, border-color 0.1s;
}
.bidder-item.selected .bidder-check {
  background: var(--sell);
  border-color: var(--sell);
}
.bidder-item.selected .bidder-name { color: #fb923c; }

.sheet-done {
  background: var(--n700);
  border: none;
  border-radius: var(--r-pill);
  padding: 16px;
  font-family: var(--font);
  font-size: 17px;
  font-weight: 500;
  color: var(--n50);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
  flex-shrink: 0;
  letter-spacing: 0.1px;
}
.sheet-done:active { background: var(--n600); }

/* ── Weight entry sheet ──────────────────────────────────── */

.weight-sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #252c36;
  border-radius: 20px 20px 0 0;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 12;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 12px 16px 40px;
}
.weight-sheet.open { transform: translateY(0); }

.weight-display {
  font-size: 60px;
  font-weight: 500;
  color: var(--n800);
  text-align: center;
  padding: 12px 0;
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 10px;
  letter-spacing: -1px;
}
.weight-display .w-unit {
  font-size: 24px;
  font-style: italic;
  color: var(--n500);
  font-weight: 400;
  letter-spacing: 0;
}

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.np-btn {
  background: var(--n200);
  border: none;
  border-radius: var(--r-sm);
  padding: 0;
  height: 56px;
  font-family: var(--font);
  font-size: 22px;
  font-weight: 500;
  color: var(--n800);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.np-btn:active { background: #3a4250; }
.np-btn.action { color: var(--n500); font-size: 16px; background: var(--n200); }
.np-btn.confirm { background: var(--sell); color: white; font-size: 16px; font-weight: 600; }
.np-btn.confirm:active { background: #ea6c0e; }
</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- ── Status bar ── -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="none" aria-hidden="true">
        <rect x="0"   y="4" width="3" height="8"  rx="1" fill="white" opacity="0.4"/>
        <rect x="5"   y="2.5" width="3" height="9.5" rx="1" fill="white" opacity="0.6"/>
        <rect x="10"  y="1" width="3" height="11" rx="1" fill="white" opacity="0.8"/>
        <rect x="15"  y="0" width="3" height="12" rx="1" fill="white"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" aria-hidden="true">
        <path d="M8 4C9.7 4 11.2 4.7 12.3 5.8L13.7 4.4C12.2 2.9 10.2 2 8 2S3.8 2.9 2.3 4.4L3.7 5.8C4.8 4.7 6.3 4 8 4Z" fill="white"/>
        <path d="M8 7C9 7 9.9 7.4 10.6 8.1L12 6.7C10.9 5.6 9.5 5 8 5S5.1 5.6 4 6.7L5.4 8.1C6.1 7.4 7 7 8 7Z" fill="white" opacity="0.7"/>
        <circle cx="8" cy="10.5" r="1.5" fill="white"/>
      </svg>
      <svg width="26" height="12" viewBox="0 0 26 12" fill="none" aria-hidden="true">
        <rect x="0.5" y="0.5" width="22" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/>
        <rect x="2"   y="2"   width="17" height="8" rx="2" fill="white"/>
        <path d="M24 4.5C24.8 4.8 25.5 5.4 25.5 6S24.8 7.2 24 7.5V4.5Z" fill="white" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- ── Scrollable content ── -->
  <div class="content" id="content">

    <div class="lot-heading" id="lotHeading">Lot 81</div>

    <div class="lot-card">

      <!-- Vendor info -->
      <div class="lot-info">
        <div class="lot-vendor">Jenna Keliwen Cattle</div>
        <div class="lot-meta">
          <span>3yr</span><span>Speckle Park</span><span>Breeding Bulls</span>
        </div>
      </div>

      <!-- Tally + Weight -->
      <div class="cell-row">
        <div class="cell no-tap">
          <div class="cell-label">Tally</div>
          <div class="cell-value">2</div>
        </div>
        <div class="cell" id="weightCell" onclick="openWeightSheet()" role="button" aria-label="Edit weight">
          <div class="cell-label">Weight</div>
          <div class="cell-value right">
            <span id="weightDisplay">255</span>
            <span class="cell-unit">kg</span>
          </div>
        </div>
      </div>

      <!-- Price/kg + Price/head -->
      <div class="price-row">
        <div class="price-cell">
          <div class="cell-label">Price</div>
          <div class="cell-value right">
            <span id="pricePerKg">3.10</span>
            <span class="cell-unit">/kg</span>
          </div>
        </div>
        <div class="price-cell">
          <div class="cell-label price-label-hidden">—</div>
          <div class="cell-value right">
            <span id="pricePerHead">790.50</span>
            <span class="cell-unit">/head</span>
          </div>
        </div>
      </div>

      <!-- Price picker -->
      <div class="picker-wrap">
        <button class="picker-side-btn" id="btnDown" aria-label="Lower price">−</button>
        <div class="picker" id="picker">
          <div class="picker-track" id="pickerTrack"></div>
        </div>
        <button class="picker-side-btn" id="btnUp" aria-label="Raise price">+</button>
      </div>

      <!-- Action chips -->
      <div class="chips-row" id="chipsRow"></div>

      <!-- Notes -->
      <div class="notes-cell">
        <div class="cell-label">Notes</div>
        <textarea class="notes-textarea" rows="2" placeholder="Add a note…" aria-label="Lot notes"></textarea>
      </div>

    </div><!-- /lot-card -->

    <!-- Navigation -->
    <div class="nav-row">
      <button class="btn-prev" onclick="navLot(-1)">Previous</button>
      <button class="btn-next" onclick="navLot(1)">Next lot →</button>
    </div>

  </div><!-- /content -->

  <!-- ── Bidder sheet backdrop ── -->
  <div class="backdrop" id="bidderBackdrop" onclick="closeBidderSheet()"></div>

  <!-- ── Bidder sheet ── -->
  <div class="sheet" id="bidderSheet" role="dialog" aria-label="Select person">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Select buyer</div>
    <input class="sheet-search" id="sheetSearch" type="search" autocomplete="off" autocorrect="off" placeholder="Search bidders…" oninput="filterBidders()">
    <div class="bidder-list" id="bidderList" role="listbox"></div>
    <button class="sheet-done" id="sheetDoneBtn" onclick="closeBidderSheet()">Done</button>
  </div>

  <!-- ── Weight backdrop ── -->
  <div class="backdrop" id="weightBackdrop" onclick="closeWeightSheet()" style="z-index:11"></div>

  <!-- ── Weight sheet ── -->
  <div class="weight-sheet" id="weightSheet" role="dialog" aria-label="Enter weight">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Enter weight</div>
    <div class="weight-display">
      <span id="weightInputDisplay">—</span>
      <span class="w-unit">kg</span>
    </div>
    <div class="numpad">
      <button class="np-btn" onclick="numpad('7')">7</button>
      <button class="np-btn" onclick="numpad('8')">8</button>
      <button class="np-btn" onclick="numpad('9')">9</button>
      <button class="np-btn" onclick="numpad('4')">4</button>
      <button class="np-btn" onclick="numpad('5')">5</button>
      <button class="np-btn" onclick="numpad('6')">6</button>
      <button class="np-btn" onclick="numpad('1')">1</button>
      <button class="np-btn" onclick="numpad('2')">2</button>
      <button class="np-btn" onclick="numpad('3')">3</button>
      <button class="np-btn action" onclick="numpad('del')">⌫</button>
      <button class="np-btn" onclick="numpad('0')">0</button>
      <button class="np-btn confirm" onclick="confirmWeight()">Set</button>
    </div>
  </div>

</div><!-- /phone -->

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Price picker
// ─────────────────────────────────────────────────────────────────────────────

const STEP       = 0.02;
const START      = 0.50;
const TOTAL      = 350;   // 0.50 → 7.48 $/kg
const ITEM_H     = 40;    // px per picker slot
const VISIBLE    = 4;     // items shown either side of center

let priceIdx = Math.round((3.10 - START) / STEP); // start at 3.10

function getPrice(i) { return START + i * STEP; }
function fmt(n, dp) { return n.toFixed(dp); }

function buildPicker() {
  const track = document.getElementById('pickerTrack');
  for (let i = 0; i < TOTAL; i++) {
    const el = document.createElement('div');
    el.className = 'picker-item';
    el.textContent = fmt(getPrice(i), 2);
    track.appendChild(el);
  }
  positionPicker(false);
  updatePriceDisplay();
}

function positionPicker(animate) {
  const track = document.getElementById('pickerTrack');
  // center the priceIdx item in the 160px picker
  const offset = (160 / 2) - (priceIdx * ITEM_H) - (ITEM_H / 2);
  track.style.transition = animate ? 'transform 0.18s cubic-bezier(0.22,1,0.36,1)' : 'none';
  track.style.transform = `translateY(${offset}px)`;
  stylePickerItems();
}

function stylePickerItems() {
  const items = document.getElementById('pickerTrack').children;
  for (let i = 0; i < items.length; i++) {
    const dist = Math.abs(i - priceIdx);
    let fs, col, op;
    switch (dist) {
      case 0: fs = '34px'; col = '#f2f4f6'; op = 1;    break;
      case 1: fs = '22px'; col = '#c8cdd3'; op = 1;    break;
      case 2: fs = '16px'; col = '#c8cdd3'; op = 0.65; break;
      case 3: fs = '12px'; col = '#9ca3ac'; op = 0.45; break;
      case 4: fs = '10px'; col = '#9ca3ac'; op = 0.25; break;
      default: fs = '0px'; col = '#9ca3ac'; op = 0;    break;
    }
    items[i].style.fontSize = fs;
    items[i].style.color    = col;
    items[i].style.opacity  = op;
  }
}

function updatePriceDisplay() {
  const p = getPrice(priceIdx);
  document.getElementById('pricePerKg').textContent = fmt(p, 2);
  const w = parseInt(document.getElementById('weightDisplay').textContent, 10) || 0;
  document.getElementById('pricePerHead').textContent = w > 0 ? fmt(p * w, 2) : '—';
}

function movePicker(delta) {
  priceIdx = Math.max(0, Math.min(TOTAL - 1, priceIdx + delta));
  positionPicker(true);
  updatePriceDisplay();
}

document.getElementById('btnDown').addEventListener('click', () => movePicker(-1));
document.getElementById('btnUp').addEventListener('click',   () => movePicker(1));

// Touch/pointer drag on picker
let dragY0 = null, dragIdx0 = null, dragging = false;
const pickerEl = document.getElementById('picker');

pickerEl.addEventListener('pointerdown', e => {
  dragY0 = e.clientY;
  dragIdx0 = priceIdx;
  dragging = true;
  pickerEl.setPointerCapture(e.pointerId);
  document.getElementById('pickerTrack').style.transition = 'none';
});
pickerEl.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dy = dragY0 - e.clientY; // drag up = positive
  const steps = Math.round(dy / 24);
  priceIdx = Math.max(0, Math.min(TOTAL - 1, dragIdx0 + steps));
  positionPicker(false);
  updatePriceDisplay();
});
pickerEl.addEventListener('pointerup', () => {
  dragging = false;
  positionPicker(true);
});

buildPicker();

let buyer = null;
let underbidders = new Set();
let sheetMode = null;      // 'buyer' | 'underbidder'

function plusIcon() {
  return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
    <line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

}
function checkIcon() {
  return `<svg width="12" height="10" viewBox="0 0 12 10" fill="none" aria-hidden="true">
    <path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}
function clockIcon() {
  return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
    <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/>

  </svg>`;
}

function renderChips() {
  const row = document.getElementById('chipsRow');
  let html = '';

  // Buyer chip
  if (buyer) {
    html += `<button class="chip buyer-chip" onclick="openBidderSheet('buyer')" aria-label="Change buyer">
      <span class="chip-label">${buyer}</span>
      <span class="chip-remove" onclick="event.stopPropagation(); clearBuyer()" aria-label="Remove buyer">×</span>
    </button>`;
  } else {
    html += `<button class="chip" onclick="openBidderSheet('buyer')" aria-label="Add buyer">
      <span class="chip-icon">${plusIcon()}</span>
      <span class="chip-label">Buyer</span>
    </button>`;
  }

  // Underbidder chips — each selected person shown, plus add button
  underbidders.forEach(name => {
    html += `<button class="chip has-value" onclick="openBidderSheet('underbidder')" aria-label="Edit underbidders">
      <span class="chip-label">${name}</span>
      <span class="chip-remove" onclick="event.stopPropagation(); removeUnderbidder('${name.replace(/'/g,"\\'")}')">×</span>
    </button>`;
  });
  html += `<button class="chip" onclick="openBidderSheet('underbidder')" aria-label="Add underbidder">
    <span class="chip-icon">${plusIcon()}</span>
    <span class="chip-label">Underbidder</span>
  </button>`;

  // Stud date chip
  html += `<button class="chip" onclick="alert('Stud date — coming soon')" aria-label="Add stud date">
    <span class="chip-icon">${clockIcon()}</span>
    <span class="chip-label">Stud date</span>
  </button>`;

  row.innerHTML = html;
}

function clearBuyer() { buyer = null; renderChips(); }
function removeUnderbidder(name) { underbidders.delete(name); renderChips(); }

renderChips();

// ─────────────────────────────────────────────────────────────────────────────
// Bidder sheet
// ─────────────────────────────────────────────────────────────────────────────

function openBidderSheet(mode) {
  sheetMode = mode;
  tempUBs = new Set(underbidders);
  const isUB = mode === 'underbidder';
  document.getElementById('sheetTitle').textContent = isUB ? 'Select underbidders' : 'Select buyer';
  document.getElementById('sheetDoneBtn').style.display = isUB ? 'block' : 'none';
  document.getElementById('sheetSearch').value = '';
  filterBidders();
  document.getElementById('bidderBackdrop').classList.add('open');
  document.getElementById('bidderSheet').classList.add('open');
  setTimeout(() => document.getElementById('sheetSearch').focus(), 320);
}

function closeBidderSheet() {
  if (sheetMode === 'underbidder') underbidders = new Set(tempUBs);
  document.getElementById('bidderBackdrop').classList.remove('open');
  document.getElementById('bidderSheet').classList.remove('open');
  renderChips();
}

function filterBidders() {
  const q = document.getElementById('sheetSearch').value.toLowerCase().trim();
  const list = document.getElementById('bidderList');
  const results = q ? BIDDERS.filter(b => b.toLowerCase().includes(q)) : BIDDERS;

  list.innerHTML = results.map(name => {
    const sel = sheetMode === 'buyer' ? buyer === name : tempUBs.has(name);
    const safeName = name.replace(/'/g, "\\'");
    return `<div class="bidder-item${sel ? ' selected' : ''}" role="option" aria-selected="${sel}"
        onclick="selectBidder('${safeName}')">
      <span class="bidder-name">${name}</span>
      <div class="bidder-check">${sel ? checkIcon() : ''}</div>
    </div>`;
  }).join('');
}

function selectBidder(name) {
  if (sheetMode === 'buyer') {
    buyer = name;
    closeBidderSheet();
  } else {
    if (tempUBs.has(name)) tempUBs.delete(name);
    else tempUBs.add(name);
    filterBidders();
  }
}

let wStr = '';

function openWeightSheet() {
  const cur = document.getElementById('weightDisplay').textContent;
  wStr = (cur && cur !== '—') ? cur : '';
  document.getElementById('weightInputDisplay').textContent = wStr || '—';
  document.getElementById('weightBackdrop').classList.add('open');
  document.getElementById('weightSheet').classList.add('open');
}

function closeWeightSheet() {
  document.getElementById('weightBackdrop').classList.remove('open');
  document.getElementById('weightSheet').classList.remove('open');
}

function numpad(key) {
  if (key === 'del') {
    wStr = wStr.slice(0, -1);
  } else if (wStr.length < 4) {
    wStr += key;
  }
  document.getElementById('weightInputDisplay').textContent = wStr || '—';
}

function confirmWeight() {
  if (wStr) {
    document.getElementById('weightDisplay').textContent = wStr;
    updatePriceDisplay();
  }
  closeWeightSheet();
}
