<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#11151b">
<title>Fairview — Auction v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --n50:   #11151b;
  --n100:  #1f252d;
  --n200:  #323943;
  --n300:  #4d5560;
  --n400:  #636c78;
  --n500:  #9ca3ac;
  --n600:  #c8cdd3;
  --n700:  #e4e7ea;
  --n800:  #f2f4f6;
  --n900:  #ffffff;
  --sell:  #f97316;
  --font:  'IBM Plex Sans', sans-serif;
  --r:     12px;
  --r-md:  22px;
  --r-pill:999px;
}

html { background: #11151b; background: var(--n50); overscroll-behavior: none; }

body {
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  background: var(--n50);
  color: var(--n800);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Page ──────────────────────────────────────────────────── */

.page {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: env(safe-area-inset-top, 0px);
  overflow: hidden;
  position: relative;
}

/* ── Scroll area ───────────────────────────────────────────── */

.scroll-wrap { flex: 1; overflow: hidden; position: relative; min-height: 0; }

.content {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 12px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 0;
  scrollbar-width: none;
}
.content::-webkit-scrollbar { display: none; }

.content.out-left  { animation: outLeft  0.22s ease-in  forwards; }
.content.out-right { animation: outRight 0.22s ease-in  forwards; }
.content.in-right  { animation: inRight  0.22s ease-out; }
.content.in-left   { animation: inLeft   0.22s ease-out; }

@keyframes outLeft  { to   { transform: translateX(-30%); opacity: 0; } }
@keyframes outRight { to   { transform: translateX( 30%); opacity: 0; } }
@keyframes inRight  { from { transform: translateX( 30%); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes inLeft   { from { transform: translateX(-30%); opacity: 0; } to { transform: none; opacity: 1; } }

/* ── Lot card ──────────────────────────────────────────────── */

.lot-card {
  background: linear-gradient(to bottom, var(--n100), var(--n50));
  border-radius: var(--r-md);
  border-top: 1px solid var(--n300);
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative; /* needed for overlay anchor */
}

/* ── Card header (lot number + edit icon) ──────────────────── */

.card-header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 8px 0;
  position: relative;
}
.lot-number {
  font-size: 20px;
  font-weight: 600;
  color: var(--n800);
  letter-spacing: 0.1px;
}
.edit-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--n200);
  border: none;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--n600);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s;
}
.edit-btn:active { background: #3a4250; }

.lot-info { padding: 4px 8px; }
.lot-vendor { font-size: 20px; font-weight: 600; color: var(--n800); letter-spacing: 0.1px; margin-bottom: 4px; }
.lot-meta   { font-size: 16px; font-weight: 500; color: var(--n700); letter-spacing: 0.1px; }

/* ── Data cells ────────────────────────────────────────────── */

.cell-row { display: flex; gap: 12px; }

.cell {
  background: var(--n200);
  border-top: 1px solid var(--n300);
  border-radius: var(--r);
  padding: 8px 12px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s;
}
.cell:active { background: #3a4250; }

.cell-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--n600);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  line-height: 1.4;
}

.cell-body {
  display: flex;
  align-items: baseline;
  gap: 3px;
  flex-wrap: nowrap;
  min-height: 28px;
}
.cell-body.right { justify-content: flex-end; }
.cell-body.stacked {
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
  min-height: auto;
  flex-wrap: wrap;
}
.cell-body.right.stacked { align-items: flex-end; }

.cell-value     { font-size: 24px; font-weight: 500; color: var(--n800); line-height: 1; white-space: nowrap; flex-shrink: 0; }
.cell-value.dim { color: var(--n400); font-size: 20px; }
.cell-unit      { font-size: 14px; font-style: italic; color: var(--n500); font-weight: 400; white-space: nowrap; flex-shrink: 0; }
.range-word     { font-size: 13px; font-style: italic; color: var(--n500); font-weight: 400; white-space: nowrap; flex-shrink: 0; }
.range-primary  { display: flex; align-items: baseline; gap: 3px; }
.range-secondary{ display: flex; align-items: baseline; gap: 4px; margin-top: 1px; }
.range-dash     { font-size: 12px; color: var(--n400); font-weight: 400; }
.cell-value-sm  { font-size: 17px; font-weight: 500; color: var(--n500); }

/* ── Price row ─────────────────────────────────────────────── */

.price-row { display: flex; }
.price-cell {
  background: var(--n200);
  border-top: 1px solid var(--n300);
  padding: 8px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  /* Prevent browser scroll/zoom so hold+drag works cleanly */
  touch-action: none;
  user-select: none;
  transition: background 0.1s;
  overflow: hidden;
}
.price-cell.active-overlay { background: #3a4250; }
.price-cell:first-child { border-radius: var(--r) 0 0 var(--r); flex: 0 0 136px; }
.price-cell:last-child  { border-radius: 0 var(--r) var(--r) 0; flex: 1; margin-left: 1px; }

/* ── Tally cell (narrow) ───────────────────────────────────── */

.cell-narrow { flex: 0 0 136px !important; }

/* ── Price overlay ─────────────────────────────────────────── */

.price-overlay {
  position: fixed;
  width: 140px;
  height: 200px;
  background: var(--n50);
  border: 1px solid var(--n300);
  border-radius: var(--r-md);
  overflow: hidden;
  z-index: 20;
  opacity: 0;
  transform: scale(0.94);
  pointer-events: none;
  transition: opacity 0.14s ease-out, transform 0.14s ease-out;
}
.price-overlay.visible {
  opacity: 1;
  transform: scale(1);
  pointer-events: all;
}
/* Fade gradients */
.price-overlay::before, .price-overlay::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 50px;
  pointer-events: none;
  z-index: 2;
}
.price-overlay::before { top: 0;    background: linear-gradient(to bottom, var(--n50), transparent); }
.price-overlay::after  { bottom: 0; background: linear-gradient(to top,   var(--n50), transparent); }

.po-track {
  display: flex;
  flex-direction: column;
  align-items: center;
  will-change: transform;
}
.po-item {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
  font-family: var(--font);
  width: 100%;
  overflow: hidden;
  transition: height 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              font-size 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              color 0.12s, opacity 0.12s;
}

/* ── Chips ──────────────────────────────────────────────────── */

.chips-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
.chip {
  background: var(--n200);
  border: none;
  border-top: 1px solid var(--n300);
  border-radius: var(--r-pill);
  padding: 9px 14px 9px 12px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  font-family: var(--font);
  touch-action: manipulation;
  transition: background 0.1s;
}
.chip:active { background: #3a4250; }
.chip.filled { background: var(--n300); }
.chip.buyer    { background: rgba(249,115,22,0.12); border: 1px solid rgba(249,115,22,0.3); }
.chip.buyer:active { background: rgba(249,115,22,0.22); }
.chip.not-sold { background: #be3030; border: none; border-top: 1px solid #ef4444; }
.chip.not-sold:active { background: #a82828; }
.chip.not-sold .chip-label { color: var(--n800); }
.chip-icon   { width: 14px; height: 14px; color: var(--n600); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chip-label  { font-size: 14px; font-weight: 500; color: var(--n700); line-height: 20px; white-space: nowrap; }
.chip.buyer .chip-label { color: #fb923c; }
.chip-x      { font-size: 18px; line-height: 1; color: var(--n500); margin-left: 1px; display: flex; align-items: center; }

/* ── Notes ──────────────────────────────────────────────────── */

.notes-cell {
  background: var(--n200);
  border-top: 1px solid var(--n300);
  border-radius: var(--r);
  padding: 8px 12px;
  min-height: 64px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.notes-ta {
  background: none; border: none; font-family: var(--font);
  font-size: 16px; color: var(--n800); resize: none; width: 100%;
  outline: none; caret-color: var(--sell); min-height: 36px;
}
.notes-ta::placeholder { color: var(--n400); font-style: italic; }

/* ── Nav ────────────────────────────────────────────────────── */

.action-row {
  display: flex;
  gap: 8px;
  margin: 0 4px;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 88px);
}

/* Icon-only prev button */
.btn-prev-icon {
  background: var(--n100);
  border-top: 1px solid var(--n300);
  border-left: none; border-right: none; border-bottom: none;
  border-radius: var(--r-pill);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--n600);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s;
  flex-shrink: 0;
}
.btn-prev-icon:active   { background: var(--n200); }
.btn-prev-icon:disabled { opacity: 0.3; pointer-events: none; }

.btn-next {
  background: var(--n200);
  border-top: 1px solid var(--n400);
  border-left: none; border-right: none; border-bottom: none;
  border-radius: var(--r-pill);
  padding: 7px 40px 11px 12px;
  font-family: var(--font);
  color: var(--n800);
  cursor: pointer;
  flex: 1;
  min-width: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s;
  display: flex;
  align-items: center;
  overflow: hidden;
  position: relative;
}
.btn-next:active   { background: #3a4250; }
.btn-next:disabled { opacity: 0.3; pointer-events: none; }
.btn-next-inner { flex: 1; display: flex; flex-direction: column; gap: 2px; align-items: center; }
.btn-next-label { font-size: 14px; font-weight: 500; color: var(--n600); letter-spacing: 0.6px; text-transform: uppercase; line-height: 20px; }
.btn-next-desc  { font-size: 16px; font-weight: 500; color: var(--n700); line-height: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.btn-next-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--n600); display: flex; align-items: center; }

/* ── Backdrop ───────────────────────────────────────────────── */

.backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s; z-index: 10;
}
.backdrop.open { opacity: 1; pointer-events: all; }

/* ── Shared sheet ───────────────────────────────────────────── */

.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #252c36;
  border-radius: 28px 28px 0 0;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 12px 16px;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
  z-index: 11;
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--n300); border-radius: 2px; margin: 0 auto 4px; flex-shrink: 0; }
.sheet-title  { font-size: 18px; font-weight: 600; color: var(--n800); flex-shrink: 0; }

/* ── Bidder sheet ───────────────────────────────────────────── */

#bidderSheet { max-height: 80dvh; }
.sheet-search {
  background: var(--n200); border: none; border-radius: var(--r);
  padding: 12px 14px; font-family: var(--font); font-size: 16px;
  color: var(--n800); width: 100%; outline: none; caret-color: var(--sell); flex-shrink: 0;
}
.sheet-search::placeholder { color: var(--n500); }
.bidder-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; scrollbar-width: none; min-height: 0; }
.bidder-list::-webkit-scrollbar { display: none; }
.bidder-row {
  padding: 13px 12px; border-radius: var(--r);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: background 0.1s; flex-shrink: 0;
}
.bidder-row:active { background: var(--n200); }
.bidder-row.sel    { background: rgba(249,115,22,0.07); }
.bidder-name { font-size: 17px; font-weight: 500; color: var(--n800); }
.bidder-row.sel .bidder-name { color: #fb923c; }
.bidder-check {
  width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--n400);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.1s, border-color 0.1s;
}
.bidder-row.sel .bidder-check { background: var(--sell); border-color: var(--sell); }
.sheet-done {
  background: var(--n700); border: none; border-radius: var(--r-pill);
  padding: 15px; font-family: var(--font); font-size: 17px; font-weight: 500;
  color: var(--n50); cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.1s; flex-shrink: 0;
}
.sheet-done:active { background: var(--n600); }

/* ── Numpad sheet ───────────────────────────────────────────── */

.np-fields { display: flex; gap: 8px; }
.np-field {
  flex: 1; background: var(--n200); border-radius: var(--r);
  padding: 10px 12px; display: flex; flex-direction: column; gap: 3px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  border: 2px solid transparent; transition: border-color 0.15s;
}
.np-field.active { border-color: rgba(249,115,22,0.5); }
.np-field-label { font-size: 11px; font-weight: 500; color: var(--n600); text-transform: uppercase; letter-spacing: 0.7px; }
.np-field-val { font-size: 28px; font-weight: 500; color: var(--n800); line-height: 1.1; display: flex; align-items: baseline; gap: 3px; }
.np-field-val.empty { color: var(--n400); font-size: 22px; }
.np-val-unit { font-size: 14px; font-style: italic; color: var(--n500); font-weight: 400; }
.np-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.np-btn {
  background: var(--n200); border: none; border-radius: var(--r);
  height: 54px; font-family: var(--font); font-size: 22px; font-weight: 500;
  color: var(--n800); cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; transition: background 0.1s;
}
.np-btn:active { background: #3a4250; }
.np-btn.sym { color: var(--n500); font-size: 17px; }
.np-btn.sym.off { opacity: 0.25; pointer-events: none; }
.np-btn.set { grid-column: 1/-1; background: var(--sell); color: white; font-size: 17px; font-weight: 600; }
.np-btn.set:active { background: #ea6c0e; }

/* ── New client ─────────────────────────────────────────────── */

.new-client-wrap { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.new-client-toggle {
  background: none; border: 1px dashed var(--n300); border-radius: var(--r);
  padding: 11px 14px; font-family: var(--font); font-size: 15px; font-weight: 500;
  color: var(--n500); cursor: pointer; text-align: left;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: border-color 0.1s, color 0.1s;
}
.new-client-toggle:active { color: var(--n700); border-color: var(--n500); }
.new-client-form { display: none; gap: 8px; flex-direction: column; }
.new-client-form.open { display: flex; }
</style>
</head>
<body>
<div class="page">
  <div class="scroll-wrap">
    <div class="content" id="content">
      <div class="lot-card">

        <!-- Header: lot number centred, edit icon right -->
        <div class="card-header">
          <div class="lot-number" id="lotNumber">Lot 81</div>
          <button class="edit-btn" aria-label="Edit lot">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M11 2l3 3-8.5 8.5H2v-3L11 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div class="lot-info">
          <div class="lot-vendor" id="lotVendor"></div>
          <div class="lot-meta"   id="lotMeta"></div>
        </div>

        <!-- Tally + Weight -->
        <div class="cell-row">
          <div class="cell cell-narrow" onclick="openNumpad('tally')">
            <div class="cell-label">Tally</div>
            <div class="cell-body" id="tallyBody"></div>
          </div>
          <div class="cell" onclick="openNumpad('weight')">
            <div class="cell-label">Weight</div>
            <div class="cell-body right" id="weightBody"></div>
          </div>
        </div>

        <!-- Price row — tap = numpad, drag = overlay picker -->
        <div class="price-row">
          <div class="price-cell" id="priceKgCell">
            <div class="cell-label">Price</div>
            <div class="cell-body right" id="priceKgBody"></div>
          </div>
          <div class="price-cell" id="priceHeadCell">
            <div class="cell-label" style="opacity:0">—</div>
            <div class="cell-body right" id="priceHeadBody"></div>
          </div>
        </div>

        <!-- Notes above chips -->
        <div class="notes-cell">
          <div class="cell-label">Notes</div>
          <textarea class="notes-ta" id="notesField" rows="2" placeholder="Add a note…"></textarea>
        </div>

        <div class="chips-row" id="chipsRow"></div>

      </div>

      <div class="action-row">
        <button class="btn-prev-icon" id="btnPrev" onclick="navigate(-1)" aria-label="Previous lot">
          <svg width="10" height="16" viewBox="0 0 10 16" fill="none" aria-hidden="true">
            <path d="M8.5 1.5L1.5 8l7 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="btn-next" id="btnNext" onclick="navigate(1)">
          <div class="btn-next-inner">
            <div class="btn-next-label" id="btnNextLabel">Next lot</div>
            <div class="btn-next-desc"  id="btnNextSub"></div>
          </div>
          <span class="btn-next-arrow"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M7.5 4l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Floating price overlay picker -->
<div class="price-overlay" id="priceOverlay">
  <div class="po-track" id="poTrack"></div>
</div>

<!-- Backdrop -->
<div class="backdrop" id="backdrop"></div>

<!-- Bidder sheet -->
<div class="sheet" id="bidderSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="bidderTitle">Select buyer</div>
  <input class="sheet-search" id="bidderSearch" type="search" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Search bidders…" oninput="filterBidders()">
  <div class="bidder-list" id="bidderList"></div>
  <div class="new-client-wrap">
    <button class="new-client-toggle" id="newClientToggle" onclick="toggleNewClient()">+ Add new person</button>
    <div class="new-client-form" id="newClientForm">
      <input class="sheet-search" type="text" id="newClientName" autocomplete="off" autocorrect="off" placeholder="Full name…">
      <button class="sheet-done" onclick="addNewClient()">Add &amp; select</button>
    </div>
  </div>
  <button class="sheet-done" id="bidderDone" onclick="closeBidderSheet()">Done</button>
</div>

<!-- Numpad sheet -->
<div class="sheet" id="numpadSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="npTitle">Enter weight</div>
  <div class="np-fields">
    <div class="np-field active" id="npFieldFrom" onclick="setNpActive('from')">
      <div class="np-field-label" id="npLabelFrom">From</div>
      <div class="np-field-val empty" id="npValFrom">
        <span id="npNumFrom">—</span>
        <span class="np-val-unit" id="npUnitFrom">kg</span>
      </div>
    </div>
    <div class="np-field" id="npFieldTo" onclick="setNpActive('to')">
      <div class="np-field-label" id="npLabelTo">To (optional)</div>
      <div class="np-field-val empty" id="npValTo">
        <span id="npNumTo">—</span>
        <span class="np-val-unit" id="npUnitTo">kg</span>
      </div>
    </div>

  <div class="np-grid">

    <button class="np-btn sym" id="npDel" onclick="npKey('del')"><svg width="22" height="17" viewBox="0 0 22 17" fill="none" aria-hidden="true"><path d="M8.5 1.5H20.5V15.5H8.5L1.5 8.5L8.5 1.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M13 6L18 11M18 6L13 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
    <button class="np-btn sym" id="npDot" onclick="npKey('.')">.</button>
    <button class="np-btn" onclick="npKey('0')">0</button>
    <button class="np-btn set" onclick="npSet()">Set</button>
  </div>
</div>

<script>
// ─── Lot data ──────────────────────────────────────────────────────────────────

const LOTS = [
  { num: 81, vendor: 'Jenna Keliwen Cattle', meta: '3yr · Speckle Park · Breeding Bulls',  desc: '2 × Speckle Park Bulls',
    tally: { from: 2, to: null }, weight: { from: 255, to: null }, priceIdx: 130 },
  { num: 82, vendor: 'Parata Angus',          meta: '2yr · Angus · Heifers',                desc: '8 × Angus Heifers',
    tally: { from: 8, to: null }, weight: { from: null, to: null }, priceIdx: 120 },
  { num: 83, vendor: 'McKenzie Farming Co',   meta: '4yr · Hereford · Cows & Calves',       desc: '3 × Hereford Cows & Calves',
    tally: { from: 3, to: null }, weight: { from: null, to: null }, priceIdx: 150 },
];

const states = LOTS.map(lot => ({
  tally:       { from: lot.tally.from,  to: lot.tally.to  },
  weight:      { from: lot.weight.from, to: lot.weight.to },
  priceIdx:    lot.priceIdx,
  priceLowIdx: null,
  headManual:  { from: null, to: null },
  buyer:       null,
  underbidders:[],
  notSold:     false,
  notes:       '',
}));

let lotIdx = 0;
const S = () => states[lotIdx];

// ─── Price picker (overlay) ────────────────────────────────────────────────────

const STEP = 0.02, START = 0.50, TOTAL = 350, PCTR = 100, DRAG_SENS = 34;

// Variable item heights by distance from centre
const ITEM_HEIGHTS = [42, 34, 22, 16, 10];
function getItemH(d) { return d < ITEM_HEIGHTS.length ? ITEM_HEIGHTS[d] : 0; }

// Precompute overlay track offsets
const pickerOffsets = new Float32Array(TOTAL);
function precomputeOffsets() {
  for (let idx = 0; idx < TOTAL; idx++) {
    const pos = TOTAL - 1 - idx;
    let sum = 0;
    for (let i = 0; i < pos; i++) sum += getItemH(Math.abs(i - pos));
    pickerOffsets[idx] = PCTR - ITEM_HEIGHTS[0] / 2 - sum;
  }
}

function getPrice(i) { return START + i * STEP; }
function fmtP(n)     { return n.toFixed(2); }

// Overlay display mode: 'kg' or 'head' — set when overlay is triggered
let overlayDisplayMode = 'kg';

function getOverlayLabel(i) {
  if (overlayDisplayMode === 'head') {
    const w = S().weight.from;
    if (w) return '$' + Math.round(getPrice(i) * w).toLocaleString();
  }
  return fmtP(getPrice(i));
}

function buildOverlay() {
  const track = document.getElementById('poTrack');
  for (let i = 0; i < TOTAL; i++) {
    const el = document.createElement('div');
    el.className = 'po-item';
    el.textContent = getOverlayLabel(TOTAL - 1 - i); // reversed: high prices at top
    track.appendChild(el);
  }
  precomputeOffsets();
}

function refreshOverlayLabels() {
  const items = document.getElementById('poTrack').children;
  for (let i = 0; i < items.length; i++) items[i].textContent = getOverlayLabel(TOTAL - 1 - i);
}

function applyOverlayPos(animate) {
  const track = document.getElementById('poTrack');
  track.style.transition = animate
    ? 'transform 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94)'
    : 'none';
  track.style.transform = `translateY(${pickerOffsets[S().priceIdx]}px)`;
}

function styleOverlayItems() {
  const items = document.getElementById('poTrack').children;
  const centerPos = TOTAL - 1 - S().priceIdx;
  for (let i = 0; i < items.length; i++) {
    const d = Math.abs(i - centerPos);
    let h, fs, col, op;
    switch (d) {
      case 0: h=42; fs='34px'; col='#f2f4f6'; op=1;    break;
      case 1: h=34; fs='20px'; col='#c8cdd3'; op=1;    break;
      case 2: h=22; fs='14px'; col='#c8cdd3'; op=0.65; break;
      case 3: h=16; fs='11px'; col='#9ca3ac'; op=0.4;  break;
      case 4: h=12; fs='9px';  col='#9ca3ac'; op=0.2;  break;
      default:h=0;  fs='0px';  col='#9ca3ac'; op=0;    break;
    }
    items[i].style.height   = h + 'px';
    items[i].style.fontSize = fs;
    items[i].style.color    = col;
    items[i].style.opacity  = op;
  }
}

// ─── Overlay show / hide ───────────────────────────────────────────────────────

const OW = 140, OH = 200; // overlay width / height

function showPriceOverlay(mode, anchorEl) {
  overlayDisplayMode = mode;
  refreshOverlayLabels();
  applyOverlayPos(false);
  styleOverlayItems();

  const overlay = document.getElementById('priceOverlay');
  const rect = anchorEl.getBoundingClientRect();

  // Horizontal: left-align with $/kg cell, right-align with $/head cell
  if (mode === 'kg') {
    overlay.style.left  = rect.left + 'px';
    overlay.style.right = 'auto';
  } else {
    overlay.style.left  = Math.max(8, rect.right - OW) + 'px';
    overlay.style.right = 'auto';
  }

  // Vertical: centre on triggering cell, clamped to viewport
  const top = Math.max(8, Math.min(window.innerHeight - OH - 8,
    rect.top + rect.height / 2 - OH / 2));
  overlay.style.top = top + 'px';

  overlay.classList.add('visible');
  anchorEl.classList.add('active-overlay');
}

function hidePriceOverlay() {
  document.getElementById('priceOverlay').classList.remove('visible');
  document.querySelectorAll('.price-cell').forEach(c => c.classList.remove('active-overlay'));
}

// ─── Hold/drag detection on price cells ───────────────────────────────────────

let holdMode     = null; // 'kg' | 'head'
let holdMoved    = false;
let overlayOn    = false;
let ovStartY     = 0;
let ovDragIdx    = 0;
let ovVelY       = 0, ovPrevY = 0, ovPrevT = 0;
let ovRafId      = null;

function priceCellDown(e, mode) {
  if (ovRafId) { cancelAnimationFrame(ovRafId); ovRafId = null; }
  holdMode  = mode;
  holdMoved = false;
  overlayOn = false;
  ovStartY  = e.clientY;
  ovDragIdx = S().priceIdx;
  ovVelY = 0; ovPrevY = e.clientY; ovPrevT = performance.now();
  e.currentTarget.setPointerCapture(e.pointerId);
  e.preventDefault();
}

function priceCellMove(e) {
  if (!holdMode) return;
  const dy = e.clientY - ovStartY;

  // Trigger overlay once movement exceeds threshold
  if (!overlayOn && Math.abs(dy) > 8) {
    holdMoved = true;
    overlayOn = true;
    showPriceOverlay(holdMode, e.currentTarget);
  }

  if (overlayOn) {
    const now = performance.now(), dt = now - ovPrevT;
    if (dt > 0) ovVelY = (ovPrevY - e.clientY) / dt;
    ovPrevY = e.clientY; ovPrevT = now;

    const delta = ovStartY - e.clientY;
    S().priceIdx = Math.max(0, Math.min(TOTAL - 1, Math.round(ovDragIdx - delta / DRAG_SENS)));
    applyOverlayPos(false);
    styleOverlayItems();
    updateCells();
  }
}

function priceCellUp(e) {
  if (!holdMoved) {
    // Clean tap — open numpad
    openNumpad(holdMode === 'kg' ? 'pricekg' : 'pricehead');
  } else if (overlayOn) {
    // Momentum coast after drag
    hidePriceOverlay();
    let v = ovVelY;
    function coast() {
      v *= 0.82;
      if (Math.abs(v) < 0.03) return;
      S().priceIdx = Math.max(0, Math.min(TOTAL - 1, Math.round(S().priceIdx - v * 1.4)));
      updateCells();
      ovRafId = requestAnimationFrame(coast);
    }
    ovRafId = requestAnimationFrame(coast);
  }
  overlayOn = false;
  holdMode  = null;
}

document.getElementById('priceKgCell')  .addEventListener('pointerdown', e => priceCellDown(e, 'kg'));
document.getElementById('priceHeadCell').addEventListener('pointerdown', e => priceCellDown(e, 'head'));
document.getElementById('priceKgCell')  .addEventListener('pointermove', priceCellMove);
document.getElementById('priceHeadCell').addEventListener('pointermove', priceCellMove);
document.getElementById('priceKgCell')  .addEventListener('pointerup',   priceCellUp);
document.getElementById('priceHeadCell').addEventListener('pointerup',   priceCellUp);

// ─── Cell rendering ────────────────────────────────────────────────────────────

let fontsReady = false;
document.fonts.ready.then(() => { fontsReady = true; updateCells(); });

function renderCell(id, from, to, unit, rightAlign) {
  const el = document.getElementById(id);
  el.classList.toggle('right', !!rightAlign);
  el.classList.remove('stacked');
  const u = unit ? `<span class="cell-unit">${unit}</span>` : '';

  if (from === null || from === undefined) {
    el.innerHTML = `<span class="cell-value dim">—</span>${u}`;
    return;
  }
  const hasRange = to !== null && to !== undefined;
  if (!hasRange) {
    el.innerHTML = `<span class="cell-value">${from}</span>${u}`;
    return;
  }

  const stackedHTML = `<div class="range-primary"><span class="cell-value">${from}</span>${u}</div>
    <div class="range-secondary"><span class="range-dash">–</span><span class="cell-value-sm">${to}</span></div>`;

  if (!fontsReady) {
    el.classList.add('stacked');
    el.innerHTML = stackedHTML;
    return;
  }

  // Font loaded — try inline
  el.innerHTML = `<span class="cell-value">${from}</span><span class="range-word">to</span><span class="cell-value">${to}</span>${u}`;

  const elR = el.getBoundingClientRect().right;
  let overflows = false;
  for (const child of el.children) {
    if (child.getBoundingClientRect().right > elR + 2) { overflows = true; break; }
  }
  if (overflows) {
    el.classList.add('stacked');
    el.innerHTML = stackedHTML;
  }
}

function computeHead() {
  const s = S();
  if (!s.weight.from) return { from: null, to: null };
  const pHi = getPrice(s.priceIdx);
  const pLo = s.priceLowIdx !== null ? getPrice(s.priceLowIdx) : pHi;
  const low  = Math.min(pLo, pHi) * s.weight.from;
  const high = Math.max(pLo, pHi) * (s.weight.to || s.weight.from);
  if (Math.abs(low - high) < 0.005) return { from: low.toFixed(2), to: null };
  return { from: low.toFixed(2), to: high.toFixed(2) };
}

function updateCells() {
  const s = S();
  renderCell('tallyBody',    s.tally.from,  s.tally.to,  '');
  renderCell('weightBody',   s.weight.from, s.weight.to, 'kg', true);
  const pHiStr = fmtP(getPrice(s.priceIdx));
  const pLoStr = s.priceLowIdx !== null ? fmtP(getPrice(s.priceLowIdx)) : null;
  renderCell('priceKgBody', pLoStr || pHiStr, pLoStr ? pHiStr : null, '/kg', true);
  if (s.headManual.from !== null) {
    renderCell('priceHeadBody', s.headManual.from, s.headManual.to, '/head', true);
  } else {
    const h = computeHead();
    renderCell('priceHeadBody', h.from, h.to, '/head', true);
  }
}

// ─── Numpad ────────────────────────────────────────────────────────────────────

let npMode = null, npActive = 'from', npFrom = '', npTo = '';

const NP_CFG = {
  tally:     { title: 'Enter tally',     unit: '',      maxLen: 4, decimal: false, labelFrom: 'From', labelTo: 'To (optional)' },
  weight:    { title: 'Enter weight',    unit: 'kg',    maxLen: 6, decimal: true,  labelFrom: 'From', labelTo: 'To (optional)' },
  pricekg:   { title: 'Set price /kg',   unit: '/kg',   maxLen: 5, decimal: true,  labelFrom: 'Low (optional)', labelTo: 'Main' },
  pricehead: { title: 'Set price /head', unit: '/head', maxLen: 7, decimal: true,  labelFrom: 'From', labelTo: 'To (optional)' },
};

function openNumpad(mode) {
  npMode = mode;
  const s = S(), cfg = NP_CFG[mode];
  if (mode === 'tally')     { npFrom = s.tally.from  !== null ? String(s.tally.from)  : ''; npTo = s.tally.to   !== null ? String(s.tally.to)   : ''; npActive = 'from'; }
  else if (mode === 'weight')    { npFrom = s.weight.from !== null ? String(s.weight.from) : ''; npTo = s.weight.to  !== null ? String(s.weight.to)  : ''; npActive = 'from'; }
  else if (mode === 'pricekg')   { npFrom = s.priceLowIdx !== null ? fmtP(getPrice(s.priceLowIdx)) : ''; npTo = fmtP(getPrice(s.priceIdx)); npActive = 'to'; }
  else if (mode === 'pricehead') { npFrom = s.headManual.from !== null ? String(s.headManual.from) : ''; npTo = s.headManual.to !== null ? String(s.headManual.to) : ''; npActive = 'from'; }
  document.getElementById('npTitle').textContent     = cfg.title;
  document.getElementById('npLabelFrom').textContent = cfg.labelFrom;
  document.getElementById('npLabelTo').textContent   = cfg.labelTo;
  document.getElementById('npUnitFrom').textContent  = cfg.unit;
  document.getElementById('npUnitTo').textContent    = cfg.unit;
  document.getElementById('npDot').classList.toggle('off', !cfg.decimal);
  renderNpFields();
  openSheet('numpad');
}

function setNpActive(w) { npActive = w; renderNpFields(); }

function renderNpFields() {
  const set = (fId, vId, nId, str, isActive) => {
    document.getElementById(fId).classList.toggle('active', isActive);
    const vEl = document.getElementById(vId);
    vEl.classList.toggle('empty', !str);
    document.getElementById(nId).textContent = str || '—';
  };
  set('npFieldFrom','npValFrom','npNumFrom', npFrom, npActive==='from');
  set('npFieldTo',  'npValTo',  'npNumTo',   npTo,   npActive==='to');
}

function npKey(key) {
  const cfg = NP_CFG[npMode];
  let cur = npActive === 'from' ? npFrom : npTo;
  if (key === 'del') { cur = cur.slice(0, -1); }
  else if (key === '.') { if (cfg.decimal && !cur.includes('.') && cur.length > 0) cur += '.'; }
  else { const dot = cur.indexOf('.'); if (!(dot >= 0 && cur.length - dot > 2) && cur.length < cfg.maxLen) cur += key; }
  if (npActive === 'from') npFrom = cur; else npTo = cur;
  renderNpFields();
}

function priceStrToIdx(str) {
  const n = parseFloat(str);
  return isNaN(n) ? null : Math.max(0, Math.min(TOTAL-1, Math.round((n - START) / STEP)));
}

function npSet() {
  const s = S();
  const pF = str => { const n = parseFloat(str); return isNaN(n) ? null : n; };
  if (npMode === 'tally')     { s.tally.from = pF(npFrom); s.tally.to = pF(npTo); }
  else if (npMode === 'weight')    { s.weight.from = pF(npFrom); s.weight.to = pF(npTo); s.headManual = {from:null,to:null}; refreshOverlayLabels(); }
  else if (npMode === 'pricekg')   { const hi = priceStrToIdx(npTo), lo = priceStrToIdx(npFrom); if (hi !== null) s.priceIdx = hi; s.priceLowIdx = lo; s.headManual = {from:null,to:null}; }
  else if (npMode === 'pricehead') { s.headManual.from = pF(npFrom); s.headManual.to = pF(npTo); }
  closeSheet('numpad');
  updateCells();
}

// ─── Bidder sheet ──────────────────────────────────────────────────────────────

const BIDDERS = [
  'Aaron Fitzgerald','Abigail Turner','Ben Mackay','Blake Morrison',
  'Brad Sutherland','Callum McKenzie','Cameron Taufa','Christine Dawson',
  'Craig Nelson','David Forsyth','Dean Parata','Deborah Halliday',
  'Dylan Walsh','Emma Whitfield','Ethan Hemi','Fiona Campbell',
  'Gareth Owen','Grant Stirling','Hannah Beattie','Hunter Collins',
  'Jade Rawiri',"James O'Brien",'Jason Ngata','Jessica Lambert',
  'Jonathan Cairns','Josh Tane','Karen Blackwell','Katrina Holland',
  'Kyle Robertson','Laura Sinclair','Liam Brunton','Lisa Hendricks',
  'Mark Currie','Matt Tūhoe','Melissa Grant','Michael Ahern',
  'Mike Fraser','Nathan Reid','Nicole Perkins','Olivia Stewart',
  'Paul Whaanga','Peter Donaldson','Rachel Bennett','Rebecca Ellis',
  'Ross Mackay','Ryan Coster','Sam Henare','Sarah Thompson',
  'Scott Buchanan','Shannon Kerr','Shaun Matenga','Simon Lockwood',

];

let bidderMode = null, tempUBs = [];

function openBidderSheet(mode) {
  bidderMode = mode;
  tempUBs = [...S().underbidders];
  const isUB = mode === 'underbidder';
  document.getElementById('bidderTitle').textContent  = isUB ? 'Select underbidders' : 'Select buyer';
  document.getElementById('bidderDone').style.display = isUB ? 'block' : 'none';
  document.getElementById('bidderSearch').value = '';
  document.getElementById('newClientName').value = '';
  document.getElementById('newClientForm').classList.remove('open');
  document.getElementById('newClientToggle').style.display = 'block';
  filterBidders();
  openSheet('bidder');
  setTimeout(() => document.getElementById('bidderSearch').focus(), 320);
}

function closeBidderSheet() {
  if (bidderMode === 'underbidder') S().underbidders = [...tempUBs];
  closeSheet('bidder');
  renderChips();
}

function filterBidders() {
  const q = document.getElementById('bidderSearch').value.toLowerCase().trim();
  const hits = q ? BIDDERS.filter(b => b.toLowerCase().includes(q)) : BIDDERS;
  document.getElementById('bidderList').innerHTML = hits.map(name => {
    const sel  = bidderMode === 'buyer' ? S().buyer === name : tempUBs.includes(name);
    const safe = name.replace(/'/g, "\\'");
    return `<div class="bidder-row${sel?' sel':''}" onclick="selectBidder('${safe}')">
      <span class="bidder-name">${name}</span>
      <div class="bidder-check">${sel?chkSvg():''}</div>
    </div>`;
  }).join('');
}

function selectBidder(name) {
  if (bidderMode === 'buyer') { S().buyer = name; closeBidderSheet(); }
  else { const i = tempUBs.indexOf(name); i >= 0 ? tempUBs.splice(i,1) : tempUBs.push(name); filterBidders(); }
}

// ─── Chips ─────────────────────────────────────────────────────────────────────

function plusSvg() {
  return `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><line x1="6.5" y1="1" x2="6.5" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="6.5" x2="12" y2="6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
}
function noSvg() {
  return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><line x1="2.5" y1="2.5" x2="11.5" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}
function chkSvg() {
  return `<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function renderChips() {
  const s = S();
  let html = s.buyer
    ? `<button class="chip buyer" onclick="openBidderSheet('buyer')">
        <span class="chip-label">${s.buyer}</span>
        <span class="chip-x" onclick="event.stopPropagation();S().buyer=null;renderChips()">×</span>
       </button>`
    : `<button class="chip" onclick="openBidderSheet('buyer')">
        <span class="chip-icon">${plusSvg()}</span>
        <span class="chip-label">Buyer</span>
       </button>`;
  s.underbidders.forEach(name => {
    const safe = name.replace(/'/g, "\\'");
    html += `<button class="chip filled" onclick="openBidderSheet('underbidder')">
      <span class="chip-label">${name}</span>
      <span class="chip-x" onclick="event.stopPropagation();removeUB('${safe}')">×</span>
    </button>`;
  });
  html += `<button class="chip" onclick="openBidderSheet('underbidder')">
    <span class="chip-icon">${plusSvg()}</span>
    <span class="chip-label">Underbidder</span>
  </button>`;
  const ns = S().notSold;
  html += ns
    ? `<button class="chip not-sold" onclick="S().notSold=false;renderChips()">
        <span class="chip-icon">${noSvg()}</span>
        <span class="chip-label">Not sold</span>
       </button>`
    : `<button class="chip" onclick="S().notSold=true;renderChips()">
        <span class="chip-icon">${plusSvg()}</span>
        <span class="chip-label">Not sold</span>
       </button>`;
  document.getElementById('chipsRow').innerHTML = html;
  setTimeout(() => document.getElementById('notesField')
    .scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
}

function removeUB(name) { S().underbidders = S().underbidders.filter(n=>n!==name); renderChips(); }

// ─── Sheets ────────────────────────────────────────────────────────────────────

function openSheet(which) {
  document.getElementById('backdrop').classList.add('open');
  document.getElementById(which==='bidder'?'bidderSheet':'numpadSheet').classList.add('open');
  document.getElementById('backdrop').onclick = () =>
    which==='bidder' ? closeBidderSheet() : closeSheet('numpad');
}
function closeSheet(which) {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById(which==='bidder'?'bidderSheet':'numpadSheet').classList.remove('open');
}

// ─── New client ────────────────────────────────────────────────────────────────

function toggleNewClient() {
  const form = document.getElementById('newClientForm');
  const toggle = document.getElementById('newClientToggle');
  const open = form.classList.toggle('open');
  toggle.style.display = open ? 'none' : 'block';
  if (open) setTimeout(() => document.getElementById('newClientName').focus(), 80);
}
function addNewClient() {
  const input = document.getElementById('newClientName');
  const name  = input.value.trim();
  if (!name) return;
  if (!BIDDERS.includes(name)) { BIDDERS.push(name); BIDDERS.sort(); }
  input.value = '';
  document.getElementById('newClientForm').classList.remove('open');
  document.getElementById('newClientToggle').style.display = 'block';
  selectBidder(name);
}

// ─── Navigation ───────────────────────────────────────────────────────────────

function saveCurrent() { S().notes = document.getElementById('notesField').value; }

function loadLot() {
  const lot = LOTS[lotIdx], s = S();
  document.getElementById('lotNumber').textContent = `Lot ${lot.num}`;
  document.getElementById('lotVendor').textContent = lot.vendor;
  document.getElementById('lotMeta').textContent   = lot.meta;
  document.getElementById('notesField').value      = s.notes;
  document.getElementById('btnPrev').disabled = lotIdx === 0;
  document.getElementById('btnNext').disabled = lotIdx === LOTS.length - 1;
  const next = lotIdx < LOTS.length - 1 ? LOTS[lotIdx + 1] : null;
  document.getElementById('btnNextLabel').textContent = next ? `Next Lot ${next.num}` : 'Last lot';
  document.getElementById('btnNextSub').textContent   = next ? next.desc : '';
  updateCells();
  renderChips();
}

function navigate(dir) {
  saveCurrent();
  const c = document.getElementById('content');
  const outCls = dir > 0 ? 'out-left' : 'out-right';
  const inCls  = dir > 0 ? 'in-right' : 'in-left';
  c.classList.add(outCls);
  c.addEventListener('animationend', () => {
    c.classList.remove(outCls);
    lotIdx += dir;
    loadLot();
    c.classList.add(inCls);
    c.addEventListener('animationend', () => c.classList.remove(inCls), { once: true });
  }, { once: true });
}

// ─── Init ──────────────────────────────────────────────────────────────────────

buildOverlay();
loadLot();
</script>
</body>
</html>
